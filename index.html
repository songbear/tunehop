<style>
  :root{
    --bg:#141414; --panel:#0f0f0f; --card:#1c1c1c; --card2:#232323; --line:#2b2b2b;
    --text:#efe9db; --muted:#9a9a9a; --accent:#ff5722; --accent2:#ffcf40; --gold:#ffcf40; --green:#4ade80;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Manrope","Noto Sans TC","PingFang TC",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(rgba(255,255,255,.04) 1.2px,transparent 1.2px);background-size:30px 30px;background-attachment:fixed}
  header{position:sticky;top:0;z-index:10;background:rgba(15,15,15,.9);backdrop-filter:blur(8px);border-bottom:1px solid #262626;padding:12px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:9px;cursor:pointer}
  .logo .mark{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#ffcf40,#ff5722);display:flex;align-items:center;justify-content:center;color:#141414;font-weight:800;font-size:15px}
  .logo .wm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.35rem;letter-spacing:-.02em;color:#efe9db}
  .logo .zh{font-family:'Space Mono',monospace;font-size:.72rem;color:#9a9a9a;letter-spacing:.04em;align-self:flex-end;padding-bottom:4px;white-space:nowrap}
  .logo .wm{white-space:nowrap}
  .pill{white-space:nowrap}
  .score{white-space:nowrap}
  .spacer{flex:1}
  .pill{border:1px solid #3a3a3a;background:var(--card);color:var(--text);border-radius:999px;padding:6px 14px;font-size:.85rem;cursor:pointer;transition:.2s}
  .pill:hover{border-color:var(--accent2)}
  .score{color:var(--gold);font-weight:700;font-size:.9rem;font-family:'Space Mono',monospace}
  main{max-width:1000px;margin:0 auto;padding:24px 20px 80px}
  .hero{position:relative;text-align:center;padding:52px 10px 34px}
  .hero::before{content:"";position:absolute;inset:-30px 0 0;background:radial-gradient(60% 80% at 50% 0%,rgba(255,87,34,.16),transparent 60%);pointer-events:none;z-index:0}
  .hero>*{position:relative;z-index:1}
  .eyebrow{font-family:'Space Mono',monospace;font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
  .bigwm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:5rem;line-height:.9;letter-spacing:-.04em;color:#efe9db;margin-bottom:14px}
  .bigwm span{background:linear-gradient(105deg,#ffcf40,#ff5722);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero h1{font-weight:900;font-size:1.9rem;margin-bottom:10px;letter-spacing:-.01em}
  .hero p{color:var(--muted);max-width:560px;margin:0 auto;line-height:1.7}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:24px}
  .region-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
  .region-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffcf40,#ff5722)}
  .region-card:hover{transform:translateY(-5px);border-color:var(--accent2)}
  .region-card .flag{width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:1.85rem;background:#232323;border:1.5px solid var(--gold);border-radius:50% 50% 50% 8px}
  .region-card h3{margin:14px 0 6px;font-size:1.15rem;font-weight:800}
  .region-card p{color:var(--muted);font-size:.88rem;line-height:1.6}
  .region-card .cnt{margin-top:12px;font-size:.78rem;color:var(--gold);font-family:'Space Mono',monospace}
  .coming{opacity:.4;cursor:default}
  .coming::before{display:none}
  .coming .flag{border-color:#444}
  .coming:hover{transform:none;border-color:var(--line)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0}
  .search{flex:1;min-width:200px;background:var(--card);border:1px solid #3a3a3a;border-radius:999px;padding:9px 18px;color:var(--text);font-size:.9rem;outline:none}
  .search:focus{border-color:var(--accent2)}
  .chip{border:1px solid #3a3a3a;background:var(--card);color:var(--muted);border-radius:999px;padding:6px 14px;font-size:.82rem;cursor:pointer;transition:.15s}
  .chip.active{background:var(--gold);border-color:var(--gold);color:#141414;font-weight:700}
  .songs{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:14px}
  .song-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:.2s;position:relative}
  .song-card:hover{border-color:var(--accent2)}
  .song-card.featured{border-left:4px solid var(--gold)}
  .song-card .st{font-weight:800;font-size:1rem;padding-right:52px}
  .song-card .sa{color:var(--accent2);font-size:.83rem;margin-top:2px}
  .song-card .stag{display:inline-block;margin-top:8px;font-size:.72rem;color:var(--muted);border:1px solid #3a3a3a;border-radius:999px;padding:2px 10px}
  .song-card .fbadge{position:absolute;top:14px;right:14px;font-size:.72rem;color:var(--gold)}
  .song-card .donebadge{position:absolute;top:34px;right:14px;font-size:.72rem;color:var(--green)}
  .song-card .blurb{display:none;color:#d0d0d0;font-size:.85rem;line-height:1.7;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
  .song-card.open .blurb{display:block}
  .yt-search{display:inline-block;margin-top:8px;color:var(--accent2);font-size:.82rem;text-decoration:none}
  .steps{display:flex;gap:8px;margin:18px 0;flex-wrap:wrap}
  .step-btn{flex:1;min-width:110px;text-align:center;padding:11px 8px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:.85rem;cursor:pointer;transition:.2s}
  .step-btn.active{background:var(--card2);color:var(--text);border-color:var(--accent2);font-weight:700}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;line-height:1.85}
  .panel h2{font-size:1.3rem;margin-bottom:14px;font-weight:800;letter-spacing:-.01em}
  .panel h4{color:var(--accent2);margin:18px 0 8px}
  .panel p{color:#d0d0d0;margin-bottom:12px}
  .video-wrap{position:relative;padding-bottom:56.25%;border-radius:12px;overflow:hidden;margin-bottom:16px;background:#000}
  .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .no-embed{background:var(--card2);border:1px dashed #3a3a3a;border-radius:12px;padding:22px;text-align:center;margin-bottom:16px}
  .no-embed a{color:var(--accent2);font-weight:700;text-decoration:none;font-size:1rem}
  .yt-link{display:inline-block;margin-bottom:16px;color:var(--accent2);font-size:.85rem;text-decoration:none}
  .phrase{display:flex;align-items:center;gap:14px;background:var(--card2);border-radius:12px;padding:14px 16px;margin-bottom:10px;flex-wrap:wrap}
  .phrase .native{font-size:1.1rem;font-weight:700}
  .phrase .roma{color:var(--accent2);font-size:.83rem;font-family:'Space Mono',monospace}
  .phrase .mean{color:var(--muted);font-size:.88rem;flex:1;min-width:140px}
  .speak-btn{background:linear-gradient(105deg,#ffcf40,#ff5722);border:0;color:#141414;font-weight:700;border-radius:999px;padding:8px 16px;cursor:pointer;font-size:.9rem}
  .speak-btn:hover{filter:brightness(1.08)}
  .quiz-q{background:var(--card2);border-radius:12px;padding:18px;margin-bottom:14px}
  .quiz-q .qt{font-weight:700;margin-bottom:12px}
  .opt{display:block;width:100%;text-align:left;background:var(--card);border:1px solid #3a3a3a;color:var(--text);border-radius:10px;padding:10px 14px;margin-bottom:8px;cursor:pointer;transition:.15s;font-size:.92rem}
  .opt:hover{border-color:var(--accent2)}
  .opt.correct{background:#1d3b2a;border-color:var(--green)}
  .opt.wrong{background:#3b241d;border-color:var(--accent)}
  .topic{background:var(--card2);border-left:4px solid var(--gold);border-radius:10px;padding:14px 16px;margin-bottom:12px}
  .topic .tt{font-weight:700;margin-bottom:4px}
  .topic .td{color:var(--muted);font-size:.88rem;line-height:1.65}
  .note{background:#1e1e1e;border:1px dashed #4a4a4a;border-radius:10px;padding:10px 14px;font-size:.8rem;color:var(--muted);margin:10px 0 16px}

  {sid:'jp6',t:'白日',a:'King Gnu',y:2019,tag:'藝術搖滾',yt:'ony539T074w',featured:true,

  {sid:'jp7',t:'うっせぇわ',a:'Ado',y:2020,tag:'世代吶喊',yt:'Qp3b-RXtz4w',featured:true,
   story:'【「吵死了」——高中生的吶喊】〈うっせぇわ〉直譯「吵死了」,以狂暴的唱腔怒吼職場與社會的陳腐規矩,發行時 Ado 還是高中生。大人聽了皺眉、年輕人聽了共鳴,它成為世代價值觀衝突的文化現象。\n【不露臉的歌手】Ado 從不公開長相,只以插畫形象活動。在日本,「不露臉創作者」是成熟的文化傳統——從 Vocaloid 到虛擬 YouTuber,聲音與作品比外貌重要。順帶一提:「うっせぇ」是很粗魯的說法,千萬別對師長使用,這正是日語「本音(真心話)與建前(場面話)」的活教材。',

   story:'【音樂與電影一起呼吸】〈前前前世〉是動畫電影《你的名字》主題曲——導演新海誠與 RADWIMPS 深度共創,音樂不是配樂而是敘事的一部分。這部電影帶動的社會現象,讓「動畫電影×搖滾樂團」成為日本影視的黃金方程式。\n【聖地巡禮的起點】電影中出現的東京階梯、飛驒古川車站,至今仍有世界各地影迷造訪打卡。「聖地巡禮」(造訪作品場景)已是日本觀光的重要支柱,一部作品可以救活一個小鎮。',

  {sid:'jp9',t:'Plastic Love',a:'竹内まりや (Mariya Takeuchi)',y:1984,tag:'City Pop',yt:null,featured:true,

  {sid:'en4',t:'Hey Jude',a:'The Beatles',y:1968,tag:'披頭四',yt:'A_MjCqQoLLA',featured:true,

  {sid:'en5',t:'Hello',a:'Adele',y:2015,tag:'靈魂天后',yt:'YQHsXMglC9A',featured:true,

  {sid:'en6',t:'Uptown Funk',a:'Mark Ronson ft. Bruno Mars',y:2014,tag:'放克復古',yt:'OPf0YbXqDm0',featured:true,

  {sid:'med5',t:"Zorba's Dance",a:'Mikis Theodorakis',y:1964,tag:'發明的傳統',c:'🇬🇷 希臘',yt:null,featured:true,ll:'希臘語',tl:'el-GR',

  {sid:'med6',t:'Non, je ne regrette rien',a:'Édith Piaf',y:1960,tag:'香頌',c:'🇫🇷 法國',yt:null,featured:true,ll:'法語',tl:'fr-FR',
   story:'【「我一無所悔」】身高 147 公分的「小雲雀」Piaf 從巴黎街頭唱進世界殿堂,這首晚年宣言——「不,我一無所悔」——是法國香頌的精神象徵;電影《全面啟動》用它當喚醒訊號,更添一層傳奇。\n【香頌:把人生唱成詩】chanson 直譯就是「歌」,但法式香頌的重點是歌詞的文學性:愛、悔、街角與人生。法國甚至立法保障電台的法語歌播放比例——他們把歌當作語言與文化的防線。',

   story:'【法朵女王】Amália Rodrigues 把里斯本酒館的法朵(fado)唱成國家藝術:黑衣、閉眼、一把葡萄牙吉他。她逝世時,葡萄牙全國哀悼三天。\n【Saudade:無法翻譯的鄉愁】fado 意為「命運」,核心是 saudade——葡語中「對已逝或未得之物的甜蜜惆悵」,常被稱為世上最難翻譯的詞。大航海時代水手的離愁凝成民族的音樂 DNA;法朵已列聯合國無形文化遺產。',

   story:'【地中海的流浪歌手】Manu Chao 生於巴黎、父母是西班牙流亡者,他的歌混西語、法語、葡語與街頭電台取樣。〈Me gustas tú〉用最簡單的句型列舉「我喜歡的一切」:飛機、旅行、早晨、海——是全球西語課堂的最愛教材。\n【海就是交換市場】從西班牙反叛樂團 Mano Negra 到單飛走唱拉美,Manu Chao 是「音樂無國界」的行走證明。地中海本來就是語言與旋律的交換市場——兩千年來都是。',

   story:'【阿拉伯流行的世界之窗】〈Habibi ya Nour El Ain〉(親愛的,我眼中的光)是 90 年代泛阿拉伯世界的超級金曲,從開羅婚禮到歐洲夜店都在放。Amr Diab 開創「地中海之聲」:阿拉伯轉音+西班牙吉他+電子節拍。\n【Habibi:萬用的「親愛的」】habibi(對男性)/habibti(對女性)是阿拉伯語最高頻的稱呼:情人、朋友、甚至店老闆對客人都能用。學會這個字,等於拿到阿拉伯世界的社交通行證。',

  {sid:'me2',t:'Li Beirut',a:'Fairuz',y:1984,tag:'早晨之聲',c:'🇱🇧 黎巴嫩',yt:null,featured:true,ll:'阿拉伯語(黎凡特)',
   story:'【阿拉伯世界的早晨儀式】在整個阿拉伯世界,「早晨聽 Fairuz」是跨國界的生活儀式——計程車、咖啡館、廚房收音機,清晨一律是她的聲音。〈Li Beirut〉(致貝魯特)寫於內戰烽火中,是獻給傷城的情書。\n【一個聲音,一個民族的鄉愁】黎巴嫩歷經戰亂與大規模移民,Fairuz 的歌成為海外黎巴嫩人的「精神祖國」。她極少受訪、幾乎不商演的神祕感,讓她超越歌手,成為黎巴嫩本身的隱喻。',

  {sid:'me3',t:'Enta Omri',a:'Umm Kulthum',y:1964,tag:'第四座金字塔',c:'🇪🇬 埃及',yt:null,featured:true,ll:'阿拉伯語(埃及)',

  {sid:'me4',t:'Şımarık',a:'Tarkan',y:1997,tag:'土耳其出口',c:'🇹🇷 土耳其',yt:null,featured:true,ll:'土耳其語',tl:'tr-TR',

   story:'【阿拉伯流行天后的煉成】黎巴嫩歌手 Nancy Ajram 以親民鄰家形象征服全阿拉伯,MV 由後來入圍奧斯卡的名導 Nadine Labaki 操刀——黎巴嫩正是阿拉伯流行工業的核心引擎。\n【方言就是商業地圖】阿拉伯語世界橫跨 20 多國,標準語之下是埃及、黎凡特、海灣、馬格里布各大方言。歌手選哪種方言唱=選哪個市場:埃及方言觀眾最多,黎巴嫩方言最「時尚」。一首歌的語言選擇,就是一張商業地圖。',

  {sid:'me6',t:'Zidini Ishqan',a:'Kadim Al Sahir',y:1995,tag:'詩歌流行',c:'🇮🇶 伊拉克',yt:null,featured:true,ll:'阿拉伯語(標準)',
   story:'【「阿拉伯歌壇的凱撒」】伊拉克歌手 Kadim Al Sahir 在戰亂中離鄉,以歌劇般的嗓音把敘利亞詩人 Nizar Qabbani 的情詩譜成歌——〈Zidini Ishqan〉(給我更多愛)是「詩歌流行樂」的極致。\n【詩的民族】在阿拉伯文化裡,詩是最高的藝術:千年前的沙漠詩會傳統延續至今——電視詩歌選秀《百萬詩人》的獎金高達數百萬美元。流行歌手為當代詩人譜曲是常態,歌與詩從未分家。',

  {sid:'me7',t:'Man Amadeh Am',a:'Googoosh',y:1975,tag:'被靜音的女聲',c:'🇮🇷 伊朗',yt:null,featured:true,ll:'波斯語',tl:'fa-IR',
   story:'【被靜音 21 年的偶像】Googoosh 是 70 年代伊朗的超級巨星——時尚教主、電影明星、流行歌后。1979 年革命後,伊朗禁止女性公開獨唱,她留在國內沉默了 21 年;2000 年出國復出巡演,全球伊朗離散社群為之淚崩。\n【地下與屋頂的音樂】今日伊朗的流行音樂多在地下錄音室與海外運作——洛杉磯的伊朗音樂工業甚至被稱為「Tehrangeles」。音樂在哪裡都能存活,只是有時必須流亡:這是波斯流行樂最沉重也最堅韌的一課。',

  {sid:'me8',t:"Im Nin'alu",a:'Ofra Haza',y:1988,tag:'三千年一首歌',c:'🇮🇱 以色列',yt:null,featured:true,ll:'希伯來語',tl:'he-IL',
   story:'【葉門詩歌上舞池】Ofra Haza 把 17 世紀葉門猶太拉比的希伯來詩歌配上 80 年代電子節拍,〈Im Nin\'alu〉登上歐洲排行榜,之後被無數嘻哈與電音製作人取樣——古老禱文成了取樣寶庫。\n【離散音樂的層積岩】她的家族從葉門遷到以色列:歌聲裡是阿拉伯半島的轉音+希伯來經文+合成器——一首歌疊了三千年。中東音樂的邊界從不乾淨利落,層層堆疊才是它的本色。',

  {sid:'me9',t:'Aïcha',a:'Khaled',y:1996,tag:'Raï之王',c:'🇩🇿 阿爾及利亞',yt:null,featured:true,ll:'法語+阿拉伯語',
   story:'【要珠寶不如要平等】〈Aïcha〉中男子向 Aïcha 獻上一切,她回答:「我不要珠寶,我要與你平等的愛。」法語+阿拉伯語的混唱,正是北非移民二代的日常語感,也讓這首歌成為法國的全民金曲。\n【Raï:曾被禁止的「意見」】raï 在阿拉伯語意為「意見」,誕生於阿爾及利亞港城奧蘭的酒館;因為敢唱愛與慾望,曾遭保守勢力禁止、歌手甚至遇害。Khaled 們把它帶到巴黎發揚光大——北非音樂經法國轉運全球,是殖民歷史複雜的迴聲。',

  {sid:'me10',t:'Warni Warni',a:'Omar Souleyman',y:2013,tag:'婚禮到電音',c:'🇸🇾 敘利亞',yt:null,featured:true,ll:'阿拉伯語(敘利亞)',
   story:'【婚禮歌手變電音明星】Omar Souleyman 原是敘利亞東北部的婚禮歌手,錄過數百卷婚禮現場卡帶;內戰流亡後被西方電子音樂圈發掘,登上大型音樂節、與 Björk 合作——dabke 的疾速電子鍵盤成了另類舞池新寵。\n【Dabke:肩並肩的舞】dabke 是黎凡特地區(敘利亞、黎巴嫩、巴勒斯坦、約旦)的傳統踏步舞:婚禮上眾人搭肩成排、頓地而舞。流亡的婚禮歌手把家鄉節奏帶向世界——戰爭能摧毀城市,摧毀不了節拍。',

   story:'【《歌手》舞台上的哈薩克之聲】2017 年,Dimash 在中國節目《歌手》翻唱法語歌〈SOS〉,驚人的音域讓他一夜之間紅遍華語圈——一位哈薩克歌手,唱法語歌,在中國成名,再走向世界:全球化音樂路徑的教科書案例。\n【冬不拉之子】Dimash 出身音樂世家,從小學哈薩克傳統音樂,演唱會上常自彈冬不拉(dombra)演唱民謠。他的成功讓世界第一次大規模聽見「哈薩克」——對一個常被拼錯國名的國家,這是文化外交的勝利。',

  {sid:'ca2',t:'Ah!Yah!Mah!',a:'Ninety One',y:2015,tag:'Q-pop開山',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'哈薩克語',
   story:'【哈薩克版的偶像革命】Ninety One(取自哈薩克獨立年 1991)借鑑 K-pop 模式,用哈薩克語做偶像音樂,開創「Q-pop」。染髮、眼線、精緻編舞——他們的出現在哈薩克掀起軒然大波,保守團體甚至抗議到演唱會被迫取消。\n【偶像也是語言運動】在俄語長期主導的哈薩克,用哈薩克語唱流行歌本身就是宣言。Q-pop 讓年輕人覺得「說哈薩克語很潮」——流行音樂作為語言復興工具,這是活生生的案例。',

   story:'【成吉思汗的重金屬】蒙古樂團 The HU 自創「匈奴搖滾(Hunnu Rock)」:呼麥喉音、馬頭琴、口簧琴配上金屬吉他,〈Wolf Totem〉登上美國告示牌硬搖滾榜首,連《星際大戰》遊戲都請他們寫歌。\n【呼麥:一人唱兩聲部】呼麥(khöömei)是蒙古與圖瓦的傳統喉音唱法——一個人同時發出低沉基音與高亮泛音,已列聯合國無形文化遺產。The HU 證明:最古老的聲音技術,放進最重的音樂裡毫無違和。',

   story:'【沙漠中的三口井】烏茲別克樂團 Yalla 的〈Uchkuduk〉唱沙漠小城的三口井,是蘇聯時代紅遍全聯盟的「東方迪斯可」——把烏茲別克民謠旋律放進流行編曲,讓中亞聲音第一次進入蘇聯主流。\n【絲路的音樂十字路口】烏茲別克的撒馬爾罕、布哈拉是古絲路重鎮,波斯、突厥、阿拉伯音樂在此交匯千年。Yalla 的成功預演了今日的世界音樂邏輯:在地旋律+國際編曲=跨文化通行證。',

  {sid:'ca5',t:'Адай (Adai)',a:'Курмангазы 曲(冬不拉經典)',y:1860,tag:'草原器樂',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'哈薩克語',
   story:'【沒有歌詞的敘事詩】〈Adai〉是 19 世紀冬不拉大師庫爾曼加濟的「庫伊(küi)」——哈薩克的器樂敘事傳統:兩根弦講一個部落的故事,馬蹄疾馳的節奏全靠指尖。庫伊已列聯合國無形文化遺產。\n【一把琴=一個民族】哈薩克諺語說「真正的哈薩克人不是哈薩克人,而是冬不拉」。2018 年起哈薩克設立「國家冬不拉日」,街頭快閃萬人齊奏——傳統樂器作為國家認同符號,冬不拉是最鮮活的例子。',

  {sid:'ca6',t:'Джулия (Julia)',a:'A-Studio',y:1990,tag:'走出中亞',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'俄語',
   story:'【第一支征服蘇聯的哈薩克樂團】來自阿拉木圖的 A-Studio 以〈Julia〉紅遍解體前夕的蘇聯,主唱 Batyrkhan Shukenov 的溫柔嗓音成為一代人的記憶——他們證明中亞音樂人可以站上莫斯科的主舞台。\n【「中亞的門面」】A-Studio 至今仍活躍,是哈薩克流行樂的長青樹。從 A-Studio 到 Dimash,哈薩克歌手的路徑變了(從莫斯科到北京再到全世界),但課題沒變:小國音樂人如何借大市場的舞台,唱自己的名字。',

  {sid:'ca7',t:'瑪納斯史詩吟唱',a:'Manaschy(瑪納斯奇)',y:1000,tag:'活著的史詩',c:'🇰🇬 吉爾吉斯',yt:null,featured:true,ll:'吉爾吉斯語',tl:'ky-KG',
   story:'【世界最長的史詩之一】《瑪納斯》是吉爾吉斯的英雄史詩,長度數十萬行,是荷馬史詩的數十倍——靠「瑪納斯奇(manaschy)」以半唱半誦的方式世代口傳,已列聯合國無形文化遺產。\n【沒有樂器的音樂】瑪納斯奇吟唱時不用樂器,只靠節奏、音高與手勢,傳說優秀的吟唱者是「被史詩選中的人」,常自述夢中受召。在文字普及前,「唱」就是一個民族儲存記憶的硬碟——這是音樂最古老的功能。',

  {sid:'ca8',t:'Чаки чаки борон (雨滴落下)',a:'Daler Nazarov',y:1985,tag:'塔吉克之聲',c:'🇹🇯 塔吉克',yt:null,featured:true,ll:'塔吉克語(波斯語族)',tl:'fa-IR',
   story:'【中亞的波斯詩心】塔吉克是中亞唯一說波斯語族語言的國家,Daler Nazarov 的〈雨滴落下〉以吉他民謠唱波斯詩般的意象,是塔吉克與阿富汗、伊朗聽眾共同的心頭好——語言讓這三個國家共享一個詩歌宇宙。\n【山國的溫柔】塔吉克九成國土是山地,音樂帶著高山民謠的悠遠。Nazarov 也為中亞電影配樂,被視為塔吉克現代音樂之父——小國的音樂常靠一兩位巨人撐起整片天空。',

  {sid:'ca10',t:'Roses (Imanbek Remix)',a:'Imanbek',y:2019,tag:'葛萊美臥室',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'英語(哈薩克製作人)',
   story:'【鐵路員工的葛萊美】Imanbek 是哈薩克小城的鐵路調度員,下班後在筆電上重混了美國歌手 SAINt JHN 的〈Roses〉——混音爆紅全球,2021 年拿下葛萊美最佳混音製作,成為首位獲葛萊美獎的中亞音樂人,得獎時他甚至還沒去過美國。\n【製作人時代的地理終結】這個故事的重點是:他不在洛杉磯、不在倫敦,而在哈薩克的阿克蘇——串流+社群時代,好作品可以從地圖上任何一點出發。這是「樂遊世界」最想讓你記住的一課。',

const COMING=[];
/* 國家標注:song.c 優先,否則查 CMAP,再退回區域預設 defc */
const CMAP={
 en1:'🇬🇧 英國',en2:'🇬🇧 英國',en3:'🇺🇸 美國',en4:'🇬🇧 英國',en5:'🇬🇧 英國',en6:'🇬🇧🇺🇸 英/美',en7:'🇺🇸 美國',en8:'🇺🇸 美國',en9:'🇬🇧 英國',en10:'🇺🇸 美國',
 en11:'🇨🇦 加拿大',en12:'🇬🇧 英國',en13:'🇺🇸 美國',en14:'🇬🇧 英國',en15:'🇺🇸 美國',en16:'🇺🇸 美國',en17:'🇺🇸 美國',en18:'🇺🇸 美國',en19:'🇺🇸 美國',en20:'🇺🇸 美國',
 en21:'🇺🇸 美國',en22:'🇺🇸 美國',en23:'🇬🇧 英國',en24:'🇬🇧 英國',en25:'🇸🇪 瑞典',en26:'🇬🇧 英國',en27:'🇺🇸 美國',en28:'🇦🇺 澳洲',en29:'🇺🇸 美國',en30:'🇬🇧 英國'
};
REGIONS.forEach(r=>r.songs.forEach(s=>{if(!s.c)s.c=CMAP[s.sid]||r.defc||'';}));

/* ================= 渲染 ================= */
const app=document.getElementById('app');
function render(){
  document.getElementById('scoreBox').textContent='⭐ '+state.score;
  if(state.view==='home')renderHome();
  else if(state.view==='region')renderRegion();
  else renderSong();
}
function goHome(){state.view='home';render();window.scrollTo(0,0);}
function openRegion(i){state.region=i;state.view='region';state.filter='all';state.query='';render();window.scrollTo(0,0);}
function openSong(idx){state.song=idx;state.view='song';state.step=0;render();window.scrollTo(0,0);}
function setStep(s){state.step=s;render();}
function setFilter(f){state.filter=f;render();}
function setQuery(v){state.query=v.toLowerCase();renderSongList();}

function renderHome(){
  let cards=REGIONS.map((r,i)=>{
    const doneN=r.songs.filter(s=>s.featured&&state.done[s.sid]).length;
    return `<div class="region-card" onclick="openRegion(${i})">
      <div class="flag">${r.flag}</div><h3>${L(r.name)}</h3><p>${L(r.tag)}</p>
      <div class="cnt">🎵 30 ${LANG==='zh'?'首':'songs'} · ⭐ ${LANG==='zh'?'完整單元':'full units'} ${doneN}/10</div></div>`;
  }).join('');
  cards+=COMING.map(c=>`<div class="region-card coming"><div class="flag">${c.flag}</div><h3>${L(c.name)}</h3><p>${T('comingSoon')}</p></div>`).join('');
  app.innerHTML=`<div class="hero">
    <div class="bigwm">Tune<span>Hop</span></div>
    <h1>${T('heroTitle')}</h1>
    <button class="tp-btn" onclick="teleport()">✈️ ${T('teleport')}</button></div>
    <div class="grid">${cards}</div>`;
}

function songCards(){
  const r=REGIONS[state.region];
  return r.songs.filter(s=>{
    if(state.filter==='full'&&!s.featured)return false;
    if(state.filter==='lib'&&s.featured)return false;
    if(state.query&&!(s.t.toLowerCase().includes(state.query)||s.a.toLowerCase().includes(state.query)))return false;
    return true;
  }).map(s=>{
    const idx=r.songs.indexOf(s);
    if(s.featured){
      return `<div class="song-card featured" onclick="openSong(${idx})">
        <span class="fbadge">${T('fullTag')}</span>
        ${state.done[s.sid]?`<span class="donebadge">${T('doneTag')}</span>`:''}
        <div class="st">${s.t}</div><div class="sa">${s.a} · ${s.y}</div>
        <span class="stag">${s.c}</span> <span class="stag">${s.tag}</span></div>`;
    }
    return `<div class="song-card" id="lib-${s.sid}" onclick="toggleLib('${s.sid}')">
      <div class="st">${s.t}</div><div class="sa">${s.a} · ${s.y}</div>
      <span class="stag">${s.c}</span> <span class="stag">${s.tag}</span>
      <div class="blurb">${s.blurb}<br>
        <a class="yt-search" href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.a+' '+s.t)}" target="_blank" onclick="event.stopPropagation()">${T('openYT')}</a></div></div>`;
  }).join('');
}
function renderSongList(){const el=document.getElementById('songList');if(el)el.innerHTML=songCards();}
function toggleLib(sid){const el=document.getElementById('lib-'+sid);if(el)el.classList.toggle('open');}

function renderRegion(){
  const r=REGIONS[state.region];
  const chips=[['all',T('all')],['full',T('full')],['lib',T('lib')]].map(c=>
    `<button class="chip ${state.filter===c[0]?'active':''}" onclick="setFilter('${c[0]}')">${c[1]}</button>`).join('');
  const topics=r.topics.map(t=>`<div class="topic"><div class="tt">${L(t.t)}</div><div class="td">${L(t.d)}</div></div>`).join('');
  app.innerHTML=`<button class="back" onclick="goHome()">${T('back')}</button>
    <h1 style="margin-bottom:4px">${r.flag} ${L(r.name)}</h1>
    <p style="color:var(--muted)">${L(r.tag)}</p>
    ${LANG==='en'?`<div class="note">${T('enNote')}</div>`:''}
    <div class="toolbar">
      <input class="search" placeholder="${T('searchPh')}" value="${state.query}" oninput="setQuery(this.value)">
      ${chips}</div>
    <div class="note">${T('libNote')}</div>
    <div class="songs" id="songList">${songCards()}</div>
    <h2 style="margin:30px 0 6px">${T('trend')}</h2>
    <div class="note">${T('trendNote')}</div>${topics}`;
}

function renderSong(){
  const r=REGIONS[state.region],s=r.songs[state.song];
  /* 曲庫曲目(非完整單元):顯示簡介頁 */
  if(!s.featured){
    app.innerHTML=`<button class="back" onclick="state.view='region';render();window.scrollTo(0,0)">${T('back')}</button>
      <button class="tp-btn small" onclick="teleport()">✈️ ${T('teleport')}</button>
      <div class="panel"><h2>${s.a} — ${s.t}</h2>
      <p style="color:var(--muted);margin:-4px 0 12px;font-size:.85rem">${s.c} · ${s.y} · ${s.tag}</p>
      <p>${s.blurb}</p>
      <div class="no-embed">🎬<br><a href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.a+' '+s.t)}" target="_blank">${T('openYT')}</a></div>
      <div class="note">${LANG==='zh'?'🎵 此為精選曲庫曲目,完整單元(文化故事+對話+測驗)製作中。':'🎵 Library track — full unit coming soon.'}</div></div>`;
    return;
  }
  const stepBtns=T('steps').map((x,i)=>`<button class="step-btn ${i===state.step?'active':''}" onclick="setStep(${i})">${x}</button>`).join('');
  let body='';
  if(state.step===0){
    const storyArr=typeof s.story==='string'
      ? s.story.split('\n').map(p=>{const m2=p.match(/^【(.+?)】(.*)$/);return m2?[m2[1],m2[2]]:['',p];})
      : (s.story[LANG]||s.story.zh);
    const video=s.yt
      ? `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${s.yt}" allowfullscreen title="${s.t}"></iframe></div>
         <a class="yt-link" href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.a+' '+s.t)}" target="_blank">${T('ytFallback')}</a>`
      : `<div class="no-embed">🎬<br><a href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.a+' '+s.t+' official mv')}" target="_blank">${T('openYT')}</a></div>`;
    body=`<div class="panel"><h2>${s.a} — ${s.t}</h2><p style="color:var(--muted);margin:-4px 0 12px;font-size:.85rem">${s.c} · ${s.y} · ${s.tag}</p>${video}
      ${storyArr.map(x=>`<h4>${x[0]}</h4><p>${x[1]}</p>`).join('')}</div>`;
  } else if(state.step===1){
    body=`<div class="panel"><h2>💬 ${LANG==='zh'?'學會這幾句,跟當地人聊起來':'Phrases to chat with locals'}${s.ll?` <span style="font-size:.8rem;color:var(--muted)">(${s.ll})</span>`:''}</h2>
      ${s.phrases.map((p,i)=>`<div class="phrase">
        <div style="min-width:180px"><div class="native">${p.n}</div>${p.r?`<div class="roma">${p.r}</div>`:''}</div>
        <div class="mean">${L(p.m)}</div>
        <button class="speak-btn" onclick="speak(${state.region},${state.song},${i})">${T('speak')}</button></div>`).join('')}</div>`;
  } else {
    body=`<div class="panel"><h2>🎮 ${LANG==='zh'?'小測驗:答對得星星':'Quiz: earn stars'}</h2>
      ${s.quiz.map((q,qi)=>`<div class="quiz-q">
        <div class="qt">${qi+1}. ${L(q.q)}</div>
        ${shuffled(s.sid,qi,q).map(o=>`<button class="opt" onclick="answer('${s.sid}',${qi},${o.i},this)">${o.txt}</button>`).join('')}</div>`).join('')}</div>`;
  }
  app.innerHTML=`<button class="back" onclick="state.view='region';render();window.scrollTo(0,0)">${T('back')}</button>
    <button class="tp-btn small" onclick="teleport()">✈️ ${T('teleport')}</button>
    <div class="steps">${stepBtns}</div>${body}`;
}

const shuffleCache={};
function shuffled(sid,qi,q){
  const key=sid+'-'+qi+'-'+LANG;
  if(!shuffleCache[key]){
    const opts=typeof q.o[0]==='string'?q.o:(q.o[LANG]||q.o.zh);
    const arr=opts.map((txt,i)=>({txt,i}));
    for(let j=arr.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[arr[j],arr[k]]=[arr[k],arr[j]];}
    shuffleCache[key]=arr;
  }
  return shuffleCache[key];
}

/* ================= 互動 ================= */
function answer(sid,qi,choice,btn){
  const r=REGIONS[state.region],s=r.songs.find(x=>x.sid===sid),q=s.quiz[qi];
  const key=sid+'-'+qi;
  if(state.answered[key])return;
  if(choice===q.a){
    state.answered[key]=true;btn.classList.add('correct');
    state.score+=10;save();
    document.getElementById('scoreBox').textContent='⭐ '+state.score;
    toast(T('correct'));
    const done=Object.keys(state.answered).filter(k=>k.startsWith(sid+'-')).length;
    if(done===s.quiz.length&&!state.done[sid]){state.done[sid]=true;save();setTimeout(()=>toast(T('quizDone')+' 🏅'),1200);}
  }else{btn.classList.add('wrong');toast(T('wrong'));setTimeout(()=>btn.classList.remove('wrong'),900);}
}
function speak(ri,si,pi){
  const r=REGIONS[ri],s=r.songs[si],p=s.phrases[pi];
  if(!('speechSynthesis' in window)){toast(LANG==='zh'?'此瀏覽器不支援語音':'Speech not supported');return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(p.n);
  const lang=s.tl||r.tts;
  u.lang=lang;u.rate=0.85;
  const v=speechSynthesis.getVoices().find(v=>v.lang.replace('_','-').startsWith(lang.split('-')[0]));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
if('speechSynthesis' in window){speechSynthesis.getVoices();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function save(){try{localStorage.setItem('tv_state',JSON.stringify({score:state.score,done:state.done,visits:state.visits}));}catch(e){}}

/* 隨機傳送:每被傳送到一次,該曲下次權重折半 (1 → 1/2 → 1/4 …) */
function teleport(){
  const pool=[];
  REGIONS.forEach((r,ri)=>r.songs.forEach((s,si)=>pool.push({ri,si,w:1/Math.pow(2,state.visits[s.sid]||0)})));
  const total=pool.reduce((a,x)=>a+x.w,0);
  let t=Math.random()*total,pick=pool[pool.length-1];
  for(const x of pool){t-=x.w;if(t<=0){pick=x;break;}}
  const s=REGIONS[pick.ri].songs[pick.si];
  state.visits[s.sid]=(state.visits[s.sid]||0)+1;save();
  state.region=pick.ri;state.song=pick.si;state.step=0;state.view='song';
  render();window.scrollTo(0,0);
  toast('✈️ '+REGIONS[pick.ri].flag+' '+s.t);
}

render();
</script>
