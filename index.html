<style>
  :root{
    --bg:#141414; --panel:#0f0f0f; --card:#1c1c1c; --card2:#232323; --line:#2b2b2b;
    --text:#efe9db; --muted:#9a9a9a; --accent:#ff5722; --accent2:#ffcf40; --gold:#ffcf40; --green:#4ade80;
    --radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Manrope","Noto Sans TC","PingFang TC",system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(rgba(255,255,255,.04) 1.2px,transparent 1.2px);background-size:30px 30px;background-attachment:fixed}
  header{position:sticky;top:0;z-index:10;background:rgba(15,15,15,.9);backdrop-filter:blur(8px);border-bottom:1px solid #262626;padding:12px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .logo{display:flex;align-items:center;gap:9px;cursor:pointer}
  .logo .mark{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#ffcf40,#ff5722);display:flex;align-items:center;justify-content:center;color:#141414;font-weight:800;font-size:15px}
  .logo .wm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.35rem;letter-spacing:-.02em;color:#efe9db}
  .logo .zh{font-family:'Space Mono',monospace;font-size:.72rem;color:#9a9a9a;letter-spacing:.04em;align-self:flex-end;padding-bottom:4px;white-space:nowrap}
  .logo .wm{white-space:nowrap}
  .pill{white-space:nowrap}
  .score{white-space:nowrap}
  .spacer{flex:1}
  .pill{border:1px solid #3a3a3a;background:var(--card);color:var(--text);border-radius:999px;padding:6px 14px;font-size:.85rem;cursor:pointer;transition:.2s}
  .pill:hover{border-color:var(--accent2)}
  .score{color:var(--gold);font-weight:700;font-size:.9rem;font-family:'Space Mono',monospace}
  main{max-width:1000px;margin:0 auto;padding:24px 20px 80px}
  .hero{position:relative;text-align:center;padding:52px 10px 34px}
  .hero::before{content:"";position:absolute;inset:-30px 0 0;background:radial-gradient(60% 80% at 50% 0%,rgba(255,87,34,.16),transparent 60%);pointer-events:none;z-index:0}
  .hero>*{position:relative;z-index:1}
  .eyebrow{font-family:'Space Mono',monospace;font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
  .bigwm{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:5rem;line-height:.9;letter-spacing:-.04em;color:#efe9db;margin-bottom:14px}
  .bigwm span{background:linear-gradient(105deg,#ffcf40,#ff5722);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero h1{font-weight:900;font-size:1.9rem;margin-bottom:10px;letter-spacing:-.01em}
  .hero p{color:var(--muted);max-width:560px;margin:0 auto;line-height:1.7}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:24px}
  .region-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
  .region-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ffcf40,#ff5722)}
  .region-card:hover{transform:translateY(-5px);border-color:var(--accent2)}
  .region-card .flag{width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:1.85rem;background:#232323;border:1.5px solid var(--gold);border-radius:50% 50% 50% 8px}
  .region-card h3{margin:14px 0 6px;font-size:1.15rem;font-weight:800}
  .region-card p{color:var(--muted);font-size:.88rem;line-height:1.6}
  .region-card .cnt{margin-top:12px;font-size:.78rem;color:var(--gold);font-family:'Space Mono',monospace}
  .coming{opacity:.4;cursor:default}
  .coming::before{display:none}
  .coming .flag{border-color:#444}
  .coming:hover{transform:none;border-color:var(--line)}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:16px 0}
  .search{flex:1;min-width:200px;background:var(--card);border:1px solid #3a3a3a;border-radius:999px;padding:9px 18px;color:var(--text);font-size:.9rem;outline:none}
  .search:focus{border-color:var(--accent2)}
  .chip{border:1px solid #3a3a3a;background:var(--card);color:var(--muted);border-radius:999px;padding:6px 14px;font-size:.82rem;cursor:pointer;transition:.15s}
  .chip.active{background:var(--gold);border-color:var(--gold);color:#141414;font-weight:700}
  .songs{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:14px}
  .song-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:.2s;position:relative}
  .song-card:hover{border-color:var(--accent2)}
  .song-card.featured{border-left:4px solid var(--gold)}
  .song-card .st{font-weight:800;font-size:1rem;padding-right:52px}
  .song-card .sa{color:var(--accent2);font-size:.83rem;margin-top:2px}
  .song-card .stag{display:inline-block;margin-top:8px;font-size:.72rem;color:var(--muted);border:1px solid #3a3a3a;border-radius:999px;padding:2px 10px}
  .song-card .fbadge{position:absolute;top:14px;right:14px;font-size:.72rem;color:var(--gold)}
  .song-card .donebadge{position:absolute;top:34px;right:14px;font-size:.72rem;color:var(--green)}
  .song-card .blurb{display:none;color:#d0d0d0;font-size:.85rem;line-height:1.7;margin-top:10px;border-top:1px solid var(--line);padding-top:10px}
  .song-card.open .blurb{display:block}
  .yt-search{display:inline-block;margin-top:8px;color:var(--accent2);font-size:.82rem;text-decoration:none}
  .steps{display:flex;gap:8px;margin:18px 0;flex-wrap:wrap}
  .step-btn{flex:1;min-width:110px;text-align:center;padding:11px 8px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:.85rem;cursor:pointer;transition:.2s}
  .step-btn.active{background:var(--card2);color:var(--text);border-color:var(--accent2);font-weight:700}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;line-height:1.85}
  .panel h2{font-size:1.3rem;margin-bottom:14px;font-weight:800;letter-spacing:-.01em}
  .panel h4{color:var(--accent2);margin:18px 0 8px}
  .panel p{color:#d0d0d0;margin-bottom:12px}
  .video-wrap{position:relative;padding-bottom:56.25%;border-radius:12px;overflow:hidden;margin-bottom:16px;background:#000}
  .video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  .no-embed{background:var(--card2);border:1px dashed #3a3a3a;border-radius:12px;padding:22px;text-align:center;margin-bottom:16px}
  .no-embed a{color:var(--accent2);font-weight:700;text-decoration:none;font-size:1rem}
  .yt-link{display:inline-block;margin-bottom:16px;color:var(--accent2);font-size:.85rem;text-decoration:none}
  .phrase{display:flex;align-items:center;gap:14px;background:var(--card2);border-radius:12px;padding:14px 16px;margin-bottom:10px;flex-wrap:wrap}
  .phrase .native{font-size:1.1rem;font-weight:700}
  .phrase .roma{color:var(--accent2);font-size:.83rem;font-family:'Space Mono',monospace}
  .phrase .mean{color:var(--muted);font-size:.88rem;flex:1;min-width:140px}
  .speak-btn{background:linear-gradient(105deg,#ffcf40,#ff5722);border:0;color:#141414;font-weight:700;border-radius:999px;padding:8px 16px;cursor:pointer;font-size:.9rem}
  .speak-btn:hover{filter:brightness(1.08)}
  .quiz-q{background:var(--card2);border-radius:12px;padding:18px;margin-bottom:14px}
  .quiz-q .qt{font-weight:700;margin-bottom:12px}
  .opt{display:block;width:100%;text-align:left;background:var(--card);border:1px solid #3a3a3a;color:var(--text);border-radius:10px;padding:10px 14px;margin-bottom:8px;cursor:pointer;transition:.15s;font-size:.92rem}
  .opt:hover{border-color:var(--accent2)}
  .opt.correct{background:#1d3b2a;border-color:var(--green)}
  .opt.wrong{background:#3b241d;border-color:var(--accent)}
  .topic{background:var(--card2);border-left:4px solid var(--gold);border-radius:10px;padding:14px 16px;margin-bottom:12px}
  .topic .tt{font-weight:700;margin-bottom:4px}
  .topic .td{color:var(--muted);font-size:.88rem;line-height:1.65}
  .note{background:#1e1e1e;border:1px dashed #4a4a4a;border-radius:10px;padding:10px 14px;font-size:.8rem;color:var(--muted);margin:10px 0 16px}

   story:{zh:[['這首歌為什麼重要?','〈Shape of You〉是串流時代的指標歌曲,長年位居 Spotify 史上最高播放量前列。Ed Sheeran 從街頭藝人一路唱進世界最大體育場,是「創作歌手」文化的代表。'],['歌曲背後的英國','英國有深厚的「busking(街頭表演)」傳統,倫敦地鐵站甚至設有官方授權的表演點。「先在街頭磨練、再被世界看見」是英國音樂文化的重要精神。'],['一人樂團的祕密','他的演唱會以 loop pedal(循環效果器)聞名:現場即時錄下吉他、拍打與和聲層層疊加——整場體育場演出,台上只有他一個人。']],

  {sid:'en2',t:'Bohemian Rhapsody',a:'Queen',y:1975,tag:'搖滾史詩',yt:'fJ9rUzIMcZQ',featured:true,
   story:'【一首「不該紅」的歌】近六分鐘、沒有副歌、混合歌劇與重搖滾——〈Bohemian Rhapsody〉打破了流行歌的所有規則,當年電台嫌它太長太怪,結果成為史上最傳奇的搖滾史詩。2018 年同名電影再度讓它席捲全球排行榜。\n【MV 的史前史】這首歌 1975 年的宣傳影片被視為現代 MV 的先驅——在 MTV 誕生前六年,Queen 就證明了「影像+音樂」的威力。主唱 Freddie Mercury 的四聲部合唱與舞台魅力,至今仍是搖滾樂手的教科書。',

  {sid:'en3',t:'Billie Jean',a:'Michael Jackson',y:1983,tag:'流行之王',yt:'Zi_XLOBDo_Y',featured:true,

  {sid:'en4',t:'Hey Jude',a:'The Beatles',y:1968,tag:'披頭四',yt:'A_MjCqQoLLA',featured:true,
   story:'【寫給一個難過小孩的歌】Paul McCartney 寫這首歌,是為了安慰隊友 John Lennon 離婚時年幼的兒子 Julian。「把悲傷的歌唱得更好一點(take a sad song and make it better)」——私人的安慰最後成為全世界的合唱。\n【Na-na-na 的力量】歌曲後半長達四分鐘的「Na-na-na」大合唱,是演唱會萬人合唱文化的原型。披頭四在 1960 年代引發的「披頭四狂熱(Beatlemania)」,是流行文化史上第一次全球性的偶像現象——今天的 K-pop 應援,精神上都是它的後代。',

  {sid:'en5',t:'Hello',a:'Adele',y:2015,tag:'靈魂天后',yt:'YQHsXMglC9A',featured:true,
   story:'【用年齡命名人生】Adele 的專輯都以寫作時的年齡命名——《19》《21》《25》《30》,像一部用歌聲寫的自傳。〈Hello〉收錄於《25》,發行時 MV 觀看數打破當時紀錄,證明在串流時代,「一把好嗓子加一架鋼琴」依然能征服世界。\n【英國靈魂樂傳統】Adele 承襲的是英國白人靈魂樂(blue-eyed soul)的傳統——用美國靈魂樂的唱法唱英式的陰鬱與自嘲。她受訪時濃重的倫敦東區口音與爽朗笑聲,和歌聲的滄桑形成反差萌,是英國人最愛的「鄰家天后」。',

  {sid:'en6',t:'Uptown Funk',a:'Mark Ronson ft. Bruno Mars',y:2014,tag:'放克復古',yt:'OPf0YbXqDm0',featured:true,

  {sid:'en7',t:'Shake It Off',a:'Taylor Swift',y:2014,tag:'轉型宣言',yt:'nfWlot6h_JM',featured:true,
   story:'【從鄉村到流行的驚險一躍】〈Shake It Off〉所屬的專輯《1989》,是 Taylor Swift 從鄉村歌手全面轉型流行天后的宣言。放棄既有市場、賭上職業生涯的轉型,成為音樂產業「品牌重塑」的經典教案。\n【對付酸民的態度課】「Haters gonna hate, I shake it off(酸民要酸就讓他酸,我甩開就好)」——這句歌詞成為英語世界應對網路霸凌的流行語。Taylor 與粉絲(Swifties)的深度連結、重錄專輯奪回版權的行動,也讓她成為討論「創作者權益」時必提的案例。',

  {sid:'en8',t:'bad guy',a:'Billie Eilish',y:2019,tag:'Z世代',yt:'DyDfgMOUjCI',featured:true,
   story:'【臥室裡做出的葛萊美專輯】〈bad guy〉所屬專輯,是 Billie Eilish 和哥哥 FINNEAS 在自家臥室錄製的,卻橫掃葛萊美主要獎項。「臥室流行樂(bedroom pop)」的勝利宣告:在筆電時代,做出世界級音樂不再需要昂貴錄音室。\n【悄悄話美學】Billie 用氣音、悄聲的唱法取代高音轟炸,配上寬鬆的衣著與陰暗的美學,拒絕了女歌手「必須性感、必須大嗓門」的舊模板。她是 Z 世代審美的代言人:真實、低調、有點怪,而且引以為傲。',

  {sid:'en9',t:'Viva La Vida',a:'Coldplay',y:2008,tag:'體育場搖滾',yt:'dvgZkm1xWPE',featured:true,
   story:'【國王的懺悔錄】〈Viva La Vida〉以法國大革命為意象,唱一位失去一切的國王的獨白;歌名是西班牙語「人生萬歲」,取自墨西哥畫家芙烈達·卡蘿的畫作。流行歌也可以是歷史課與美術課。\n【萬人合唱的儀式】Coldplay 是「體育場搖滾(stadium rock)」的當代掌門人:演唱會發給每人一只 LED 手環,整場觀眾成為燈海的一部分。那種數萬人同唱「Ooh-oh-oh」的體驗,是現代人少數的集體儀式感——這也是為什麼串流時代,演唱會經濟反而愈來愈重要。',

  {sid:'en12',t:'Levitating',a:'Dua Lipa',y:2020,tag:'迪斯可復興',yt:null,featured:true,
   story:'【出不了門,就在家跳舞】疫情封城期間,英國歌手 Dua Lipa 逆勢推出復古舞曲專輯,〈Levitating〉輕快的迪斯可節奏成了全球網友的「客廳迪斯可」國歌:不能去派對,就把家裡變成舞池。專輯後來拿下葛萊美獎,證明艱難時刻,人們更需要快樂的音樂。\n【迪斯可不死】迪斯可誕生於 1970 年代美國的夜店文化,曾被嘲笑過時,卻每隔一段時間就復活一次。Dua Lipa 生於倫敦,父母是來自科索沃的阿爾巴尼亞家庭——移民背景的歌手撐起半個英國流行樂壇,是英國音樂圈的日常風景。',

  {sid:'en13',t:'drivers license',a:'Olivia Rodrigo',y:2021,tag:'Z世代心碎',yt:null,featured:true,
   story:'【一本公開的失戀日記】Olivia Rodrigo 原是迪士尼影集演員,十幾歲時寫下的〈drivers license〉描述終於拿到駕照、卻失去了想載的那個人。歌曲靠 TikTok 一夜爆紅,打破串流平台的播放紀錄,無數網友邊開車邊大哭翻拍,讓它成為 Z 世代的集體療傷儀式。\n【真實勝過完美】上個世代的偶像追求完美人設,Z 世代卻擁抱「真實」:素顏、哽咽、把日記寫成歌都可以。從迪士尼童星轉型創作歌手是美國演藝圈的經典路線,但 Olivia 靠的不是形象包裝,而是「說真話」的歌詞——這正是她世代的審美。',

  {sid:'en14',t:'As It Was',a:'Harry Styles',y:2022,tag:'男團單飛',yt:null,featured:true,

  {sid:'en15',t:'Bad Romance',a:'Lady Gaga',y:2009,tag:'MV藝術',yt:null,featured:true,
   story:'【把 MV 拍成藝術品】〈Bad Romance〉的 MV 以未來感的造型與前衛編舞震撼樂壇,讓 Lady Gaga 從「怪咖新人」變成流行藝術家。她證明 MV 不只是宣傳工具,更可以是一部前衛藝術短片——流行樂可以既怪誕又主流,之後十年的歌手都在追趕這個標準。\n【怪,是一種驕傲】Gaga 稱粉絲為「小怪獸(Little Monsters)」,鼓勵格格不入的年輕人擁抱自己的怪。從穿生肉裝到聲援平權,她總能把爭議變成議題。「幫粉絲取暱稱」也從此成為歐美與 K-pop 偶像圈的標配文化。',

  {sid:'en16',t:'Roar',a:'Katy Perry',y:2013,tag:'賦權國歌',yt:null,featured:true,
   story:'【聽見我的怒吼】〈Roar〉唱的是一個曾經不敢說話的人終於找回自己的聲音:「你會聽見我的怒吼」。它是「自我賦權(empowerment)」主題流行曲的教科書:旋律簡單、副歌好記,從畢業典禮到球場都聽得到,也是英語課最常拿來教的流行歌之一。\n【美國的加油歌文化】美國流行樂有一整個「賦權國歌」傳統:每個世代都需要一首「我做得到」的歌。這類歌曲常借用拳擊、「老虎之眼」等經典勵志意象,〈Roar〉的歌詞正是在向這些前輩致敬——把體育場的鬥志,搬進每個人的日常。',

  {sid:'en18',t:'Sugar',a:'Maroon 5',y:2015,tag:'驚喜企劃',yt:null,featured:true,

  {sid:'en20',t:'Counting Stars',a:'OneRepublic',y:2013,tag:'創作人樂團',yt:null,featured:true,

  {sid:'en21',t:'Lose Yourself',a:'Eminem',y:2002,tag:'嘻哈勵志',yt:null,featured:true,
   story:'【機會只有一次】〈Lose Yourself〉是電影《8 Mile》主題曲,描述底特律窮小子站上饒舌擂台前的緊張:手心冒汗、雙腿發軟,但機會只有一次,錯過就沒了。它成為史上第一首拿下奧斯卡最佳原創歌曲的饒舌作品,也是全球考生與運動員的賽前儀式歌。\n【擂台上的即興文化】battle rap(饒舌對戰)是嘻哈的核心傳統:兩人輪流即興互嗆,拚押韻、拚機智,觀眾的歡呼聲就是裁判。它誕生於美國街頭與底特律這類工業城市的地下俱樂部,是資源匱乏的年輕人「用語言翻身」的舞台。',

  {sid:'en22',t:'Smells Like Teen Spirit',a:'Nirvana',y:1991,tag:'Grunge',yt:null,featured:true,
   story:'【不想紅的樂團最紅】1991 年,西雅圖樂團 Nirvana 用〈Smells Like Teen Spirit〉點燃油漬搖滾(grunge)革命:粗糙的吉他、憤怒又疏離的吶喊,唱出 X 世代對主流社會的不耐。諷刺的是,這首「反商業」的歌成了超級暢銷曲——樂團一夕變成他們最想逃離的巨星,是流行文化的經典悖論。\n【法蘭絨與反時尚】grunge 不只是音樂,更是一種反時尚:二手法蘭絨襯衫、破牛仔褲、不梳的頭髮——「不在乎」本身變成了風格,最後連精品時裝週都開始模仿。反叛一旦夠酷,就會被主流收編,這是流行文化不斷重演的劇本。',

  {sid:'en23',t:'Wonderwall',a:'Oasis',y:1995,tag:'Britpop',yt:null,featured:true,
   story:'【人人都彈過的前奏】〈Wonderwall〉是 Britpop 時代的英國青年國歌:出自曼徹斯特勞工階級的 Gallagher 兄弟之手,副歌一響,整間酒吧都會跟著唱。它也成了世界級迷因——「會彈吉他的人都彈過」,樂器行甚至流傳「禁彈 Wonderwall」的玩笑。\n【Britpop 大戰】1995 年,Oasis 與死對頭 Blur 同週發行單曲打對台,媒體稱為「Britpop 之戰」,全英國為之瘋狂:北方勞工階級對上南方藝術學院,連晚間新聞都在報導戰況。用流行樂吵階級與地域,是非常英國的文化景觀。',

  {sid:'en24',t:'Your Song',a:'Elton John',y:1970,tag:'創作歌手',yt:null,featured:true,
   story:'【這是你的歌】〈Your Song〉是 Elton John 的成名曲之一:一個不太會說話的人,把說不出口的心意寫成歌送給對方——「我的禮物就是我的歌,這首歌是給你的」。五十多年來,它一直是婚禮與電影的常客,也是鋼琴創作歌手傳統的起點之一,證明真誠比華麗更耐聽。\n【一輩子的拍檔】Elton John 幾乎所有經典都與作詞人 Bernie Taupin 合作:Taupin 先寫詞、Elton 再譜曲,兩人合作超過半世紀。「作曲+作詞」的黃金拍檔是流行樂的重要傳統——一首好歌,常常是兩顆腦袋的化學反應。',

  {sid:'en25',t:'Dancing Queen',a:'ABBA',y:1976,tag:'迪斯可',yt:null,featured:true,
   story:'【瑞典人的英語征服】ABBA 來自瑞典,先在歐洲歌唱大賽奪冠成名,再以〈Dancing Queen〉等英語金曲征服全球——證明流行樂霸權不必屬於英美,堪稱 K-pop 出海的精神前輩。音樂劇與電影《媽媽咪呀!》讓他們的歌傳到新世代,近年更以數位分身開起「虛擬演唱會」。\n【瑞典:流行樂輸出大國】瑞典是全球最重要的流行樂輸出國之一:從 ABBA 到寫遍歐美天王天后金曲的製作人 Max Martin,小國靠完善的音樂教育與「旋律至上」的工藝傳統輸出全世界。今天許多 K-pop 歌曲,其實也出自瑞典寫手之手。',

  {sid:'en26',t:'Imagine',a:'John Lennon',y:1971,tag:'和平頌歌',yt:null,featured:true,
   story:'【想像一個沒有國界的世界】離開披頭四後,John Lennon 用〈Imagine〉描繪一個沒有國界、沒有戰爭的世界。歌曲用最簡單的鋼琴與最溫柔的旋律,說出最大膽的想像,半世紀以來成為全球和平集會的共同語言,也是奧運開幕式等大型典禮的常客。\n【一首歌能改變世界嗎?】60、70 年代的英美樂壇相信音樂能推動社會:反戰遊行有歌、民權運動有歌。Lennon 與妻子小野洋子甚至把蜜月變成「床上和平運動」,邀媒體來拍他們躺著反戰。「抗議歌曲(protest song)」的傳統,至今仍在流行樂中延續。',
   phrases:[

  {sid:'en27',t:'What a Wonderful World',a:'Louis Armstrong',y:1967,tag:'爵士',yt:null,featured:true,
   story:'【亂世中的溫柔嗓音】Louis Armstrong 是 20 世紀最偉大的爵士音樂家之一,以小號演奏與沙啞的嗓音聞名。〈What a Wonderful World〉發行於越戰年代,用綠樹、紅玫瑰與嬰兒的哭聲提醒人們:世界依然美好。多年後它因電影再度翻紅,如今是英語課聽力教材的常客。\n【爵士的故鄉紐奧良】Armstrong 出身美國南方港口城市紐奧良——爵士樂的誕生地。這座城市融合非裔、法裔與加勒比海文化,街頭銅管樂隊的遊行傳統延續至今。從紐奧良出發的爵士樂,被視為美國對世界音樂最重要的貢獻之一。',

  {sid:'en28',t:'Chandelier',a:'Sia',y:2014,tag:'不露臉表演',yt:null,featured:true,
   story:'【不露臉的巨星】Sia 成名後選擇用超大假髮遮住臉,MV 與表演讓小舞者 Maddie Ziegler 代替自己出鏡。〈Chandelier〉唱派對女孩的逞強與求救,而「不露臉」本身就是一場關於「成名代價」的行為藝術:她想被聽見,但不想被消費。\n【幕後寫手的逆襲】Sia 走紅前是替天后們寫歌的幕後寫手,多首歐美金曲都有她的手筆。流行工業裡,寫手通常是隱形的;Sia 先在幕後證明實力,再用自己的規則走到台前,成為「創作者奪回主導權」的經典故事。',

  {sid:'en29',t:'Happy',a:'Pharrell Williams',y:2013,tag:'快樂國歌',yt:null,featured:true,
   story:'【全世界一起跳的快樂】〈Happy〉是動畫《神偷奶爸2》主題曲,Pharrell Williams 用拍手節奏寫出「快樂到停不下來」的感覺。團隊推出史上第一支「24 小時 MV」:不同的人接力在街頭跳舞一整天;全球網友再翻拍自己城市的快樂版本,成為現象級的全民企劃。\n【UGC:觀眾就是製作人】〈Happy〉的翻拍熱潮是「使用者生成內容(UGC)」的教科書:官方只給一個簡單模板,剩下交給全世界發揮。十年後 TikTok 的舞蹈挑戰,玩的正是同一套邏輯——最強的宣傳,是讓觀眾自己動起來。',

  {sid:'en30',t:'Stay With Me',a:'Sam Smith',y:2014,tag:'福音靈魂',yt:null,featured:true,
   story:'【一個人的福音大合唱】〈Stay With Me〉唱的是不想孤單一人的脆弱告白,福音合唱團式的和聲讓孤獨聽起來像一場禱告。這首歌讓 Sam Smith 在葛萊美滿載而歸,成為當年的大贏家,也是 2010 年代英式靈魂樂最重要的勝利之一。\n【英式靈魂的接力賽】從 Amy Winehouse、Adele 到 Sam Smith,英國每隔幾年就交出一位靈魂樂新聲:承襲美國靈魂樂與福音的唱法,卻唱英國式的陰鬱與自省。倫敦多元的移民社群與扎實的現場演出文化,是這條「靈魂接力賽」不斷有人接棒的原因。',

  {sid:'af16',t:'Suzanna',a:'Sauti Sol',y:2020,tag:'和聲天團',c:'🇰🇪 肯亞',yt:null,featured:true,ll:'斯瓦希里語',tl:'sw-KE',

  {sid:'af19',t:'Homeless',a:'Ladysmith Black Mambazo',y:1986,tag:'無伴奏',c:'🇿🇦 南非',yt:null,featured:true,ll:'祖魯語',tl:'zu-ZA',

  {sid:'af20',t:'Madan',a:'Salif Keita',y:2002,tag:'非洲金嗓',c:'🇲🇱 馬利',yt:null,featured:true,ll:'法語',tl:'fr-FR',

  {sid:'af21',t:'Ai Du',a:'Ali Farka Touré',y:1994,tag:'沙漠藍調',c:'🇲🇱 馬利',yt:null,featured:true,ll:'法語',tl:'fr-FR',

  {sid:'af23',t:'1er Gaou',a:'Magic System',y:1999,tag:'Zouglou',c:'🇨🇮 象牙海岸',yt:null,featured:true,ll:'法語',tl:'fr-FR',

  {sid:'sa21',t:'Udd Gaye',a:'Ritviz',y:2017,tag:'電子融合',c:'🇮🇳 印度',yt:null,featured:true,ll:'印地語',

  {sid:'med12',t:'Sarà Perché Ti Amo',a:'Ricchi e Poveri',y:1981,tag:'Italo金曲',c:'🇮🇹 義大利',yt:null,featured:true,ll:'義大利語',

  {sid:'med23',t:'Misirlou',a:'地中海民謠(Dick Dale 版聞名)',y:1962,tag:'衝浪吉他',c:'🇬🇷 希臘/地中海',yt:null,featured:true,ll:'希臘語',tl:'el-GR',

  {sid:'med24',t:'Frangosyriani',a:'Markos Vamvakaris',y:1935,tag:'Rebetiko',c:'🇬🇷 希臘',yt:null,featured:true,ll:'希臘語',tl:'el-GR',

  {sid:'me19',t:'Baraye',a:'Shervin Hajipour',y:2022,tag:'推文之歌',c:'🇮🇷 伊朗',yt:null,featured:true,ll:'波斯語',tl:'fa-IR',

  {sid:'nd20',t:'Vem kan segla förutan vind?',a:'北歐民謠',y:1900,tag:'民謠課本',c:'🇸🇪🇫🇮 瑞典/芬蘭',yt:null,featured:true,

   story:'【成吉思汗的重金屬】蒙古樂團 The HU 自創「匈奴搖滾(Hunnu Rock)」:呼麥喉音、馬頭琴、口簧琴配上金屬吉他,〈Wolf Totem〉登上美國告示牌硬搖滾榜首,連《星際大戰》遊戲都請他們寫歌。\n【呼麥:一人唱兩聲部】呼麥(khöömei)是蒙古與圖瓦的傳統喉音唱法——一個人同時發出低沉基音與高亮泛音,已列聯合國無形文化遺產。The HU 證明:最古老的聲音技術,放進最重的音樂裡毫無違和。',

  {sid:'ca6',t:'Джулия (Julia)',a:'A-Studio',y:1990,tag:'走出中亞',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'俄語',

   story:'【世界最長的史詩之一】《瑪納斯》是吉爾吉斯的英雄史詩,長度數十萬行,是荷馬史詩的數十倍——靠「瑪納斯奇(manaschy)」以半唱半誦的方式世代口傳,已列聯合國無形文化遺產。\n【沒有樂器的音樂】瑪納斯奇吟唱時不用樂器,只靠節奏、音高與手勢,傳說優秀的吟唱者是「被史詩選中的人」,常自述夢中受召。在文字普及前,「唱」就是一個民族儲存記憶的硬碟——這是音樂最古老的功能。',

   story:'【一首歌掀起的社會辯論】2018 年,19 歲的吉爾吉斯歌手 Zere Asylbek 發表〈Kyz〉(女孩):「請別命令我該穿什麼、該怎麼活,我自己選擇。」這首歌在保守輿論中掀起巨浪,有人辱罵威脅,也有大批年輕人站出來聲援——一首歌變成了全國性的社會辯論。\n【流行歌作為社會運動】從美國民權運動的歌聲到這首吉爾吉斯女孩之歌,流行音樂常是社會辯論的引爆點:三分鐘的歌比三小時的演講傳得更遠。一首歌不一定能立刻改變法律,但能讓沉默的人發現:原來我不是一個人。',

  {sid:'ca22',t:'Lazgi',a:'花剌子模傳統舞曲',y:1800,tag:'千年之舞',c:'🇺🇿 烏茲別克',yt:null,featured:true,ll:'烏茲別克語',tl:'uz-UZ',
   story:'【從指尖開始的舞】Lazgi 是烏茲別克花剌子模地區的傳統歌舞,已列聯合國無形文化遺產:音樂響起,舞者從手指的顫動開始,身體彷彿被音樂一吋吋喚醒,最後全身投入旋轉——當地人說,Lazgi 跳的正是「生命甦醒」的過程。\n【花剌子模:綠洲文明的記憶】花剌子模位於阿姆河下游,是絲路上的古老綠洲文明,古城希瓦如今是世界遺產。Lazgi 的節奏與手勢承載著這片綠洲千年的悲歡——在沒有文字紀錄的角落,舞蹈就是歷史書。',

  {sid:'ca23',t:'Shashmaqom 選段',a:'布哈拉古典傳統',y:1700,tag:'宮廷遺產',c:'🇺🇿🇹🇯 烏茲別克/塔吉克',yt:null,featured:true,ll:'塔吉克語(波斯語族)',tl:'fa-IR',
   story:'【絲路城市的音樂化石】Shashmaqom 意為「六個木卡姆(調式組曲)」,是布哈拉、撒馬爾罕一帶傳承數百年的宮廷古典音樂:每個木卡姆包含器樂與聲樂章節,歌詞多採波斯與突厥古典詩——烏茲別克與塔吉克兩國共同把它申列聯合國無形文化遺產。\n【一份遺產,兩個國家】布哈拉歷史上是塔吉克語(波斯語族)人口聚居的名城,如今位於烏茲別克境內——Shashmaqom 因此是兩國共享的祖產。文化遺產常常大於現代國界:與其爭「是誰的」,不如一起傳下去,這是中亞給世界的示範。',

  {sid:'ca24',t:'Küştdepdi',a:'土庫曼傳統歌舞',y:1900,tag:'土庫曼',c:'🇹🇲 土庫曼',yt:null,featured:true,ll:'土庫曼語(突厥語族)',
   story:'【最少被聽見的中亞之聲】土庫曼是中亞最低調封閉的國家,Küştdepdi 則是它最響亮的文化名片:眾人圍成圓圈,以吟唱聲伴隨甩臂、頓足與旋轉,常見於婚禮與節慶,已列聯合國無形文化遺產。吟唱的短詩可以即興變化——一場好的 Küştdepdi,沒有兩次是一樣的。\n【圓圈舞的世界語】從土庫曼的 Küştdepdi、巴爾幹的環舞到台灣原住民的牽手歌舞,「圍成圓圈一起唱跳」在世界各地獨立出現——圓圈讓每個人面對彼此,沒有舞台與觀眾之分:這可能是人類最古老的「同樂」形式。',

  {sid:'ca25',t:'Қара жорға (Qara Jorga 黑走馬)',a:'哈薩克民謠舞曲',y:1900,tag:'全民之舞',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'哈薩克語',
   story:'【全民都會跳的黑走馬】〈Қара жорға〉(黑走馬)是哈薩克最著名的民間舞曲:模仿走馬平穩又俏皮的步伐,聳肩抖臂、馬步輕快,婚禮壓軸、廣場快閃、網路舞蹈挑戰都少不了它——如果哈薩克有一支「全民舞」,就是這一首。\n【「走馬」是哪種馬?】「жорға」指以特殊平穩步態小跑的馬,騎起來不顛簸,是草原上的頂級坐騎。把馬步編成舞步,正是馬背民族的浪漫:在哈薩克文化裡,馬不只是交通工具,更是審美與身分的核心。',

  {sid:'ca26',t:'Көзімнің қарасы (我眼中的珍寶)',a:'Абай (Abai) 詞曲',y:1890,tag:'詩聖之歌',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'哈薩克語',
   story:'【詩聖親手寫的旋律】阿拜(Abai)是 19 世紀的哈薩克詩聖:詩人、思想家、翻譯家,同時也是作曲家。〈Көзімнің қарасы〉(我眼中的珍寶)由他親自寫詞譜曲,百餘年來人人會唱——在哈薩克,背阿拜的詩與唱阿拜的歌,是同一件事。\n【一個人成為一門課】哈薩克的學校裡有專門的「阿拜學」,他的《箴言錄》被視為民族思想的基石;2020 年哈薩克更盛大紀念他 175 週年誕辰。一位詩人同時是民族的作曲家與良心——文學課與音樂課,在阿拜身上是同一堂課。',

  {sid:'ca27',t:'Дударай (Dudarai)',a:'哈薩克民謠',y:1900,tag:'跨族情歌',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'哈薩克語',
   story:'【真人真事的跨族情歌】〈Дударай〉源於流傳的真實故事:一位俄羅斯姑娘愛上哈薩克青年杜達爾,在當時的社會眼光下堅持這段感情,她思念愛人的歌謠流傳成民謠,後來還被改編成歌劇——草原上的族群交融史,用一首情歌被記住。\n【草原上的百族之地】哈薩克草原歷史上是多民族雜居之地:哈薩克人、俄羅斯與烏克蘭移民、蘇聯時期被遷徙來的朝鮮人與德意志人⋯⋯今天的哈薩克有上百個民族。一首情歌記住的不只是愛情,更是這片土地「不同民族如何一起生活」的漫長練習。',

  {sid:'ca28',t:'O\'zbegim (我的烏茲別克)',a:'Sherali Jo\'rayev',y:1981,tag:'國民歌者',c:'🇺🇿 烏茲別克',yt:null,featured:true,ll:'烏茲別克語',tl:'uz-UZ',
   story:'【婚禮必唱的認同之歌】〈我的烏茲別克〉是國民歌者 Sherali Jo\'rayev 的招牌:把詩人的愛國詩篇唱成深情長歌,細數祖先、土地與語言的驕傲。在蘇聯時代高唱「我的烏茲別克」需要勇氣,也因此獨立後它更成為認同的聲音符號,婚禮與節慶必唱。\n【歌者在婚禮的地位】在烏茲別克,大型婚禮能請到頂級歌手是全家族的面子,歌者一晚連唱數小時、賓客以舞回應——婚禮是中亞流行音樂真正的主場館:比起排行榜,能不能被婚禮點唱,才是中亞歌手的終極認證。',

  {sid:'ca29',t:'Sen (你)',a:'Moldanazar',y:2014,tag:'哈語indie',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'哈薩克語',
   story:'【哈薩克語也能很 indie】Moldanazar 用夢幻的合成器與內斂唱腔做哈薩克語獨立流行,〈Sen〉(你)是他的代表作——在俄語主導流行市場的年代,他證明母語 indie 不只是小眾自嗨,也能填滿體育館,啟發了一整代年輕人改用哈薩克語寫歌。\n【indie 是什麼?】independent(獨立)指不依賴大唱片公司,自己錄音、發行、經營聽眾——串流平台讓這條路真正可行。從台灣的獨立樂團到哈薩克的 Moldanazar,indie 的精神相同:先忠於自己的聲音,聽眾自然會找到你。',

  {sid:'ca30',t:'Той жыры (婚禮之歌)',a:'Дос-Мукасан (Dos-Mukasan)',y:1972,tag:'傳奇樂團',c:'🇰🇿 哈薩克',yt:null,featured:true,ll:'哈薩克語',
   story:'【被稱為「哈薩克披頭四」的樂團】Dos-Mukasan 誕生於 1960 年代末阿拉木圖的理工學院,是蘇聯時代最具代表性的哈薩克樂團:西式樂團編制配哈薩克語創作,〈Той жыры〉(婚禮之歌)傳唱半世紀,至今仍是哈薩克婚禮的定番曲目。\n【大學社團改寫音樂史】他們原是理工學生組的業餘樂團,卻把哈薩克語流行樂帶進蘇聯主流——從車庫與社團教室出發改寫音樂史的劇本,全世界不斷重演:披頭四來自利物浦的地下酒吧,Dos-Mukasan 來自阿拉木圖的校園。熱情起步,不需要執照。',

  {sid:'tw1',t:'望春風',a:'鄧雨賢曲/李臨秋詞',y:1933,tag:'百年經典',c:'🇹🇼 台灣',yt:null,featured:true,ll:'台語',
   story:'【九十年前的少女心事】1933 年日治時期,古倫美亞唱片發行〈望春風〉,鄧雨賢作曲、李臨秋作詞。歌詞寫少女月夜下等待心上人、聽見門外有聲卻發現只是風的害羞心情,含蓄又生動,被稱為台語歌謠之母,傳唱九十多年,幾乎每個台灣人都會哼。\n【一首歌的禁歌史】日治末期推行皇民化運動,這首歌曾被改填日語歌詞、變成時局宣傳歌;戰後戒嚴時期,許多台語歌也一度被限制傳播。一首溫柔的情歌經歷兩個時代的管制仍活了下來,正是認識台灣流行音樂史最好的入門課。',

  {sid:'tw2',t:'思慕的人',a:'洪一峰',y:1959,tag:'台語經典',c:'🇹🇼 台灣',yt:null,featured:true,ll:'台語',
   story:'【寶島歌王的低音魅力】洪一峰是 1950、60 年代的「寶島歌王」,〈思慕的人〉由他作曲、葉俊麟作詞,用溫柔醇厚的低音唱出對心上人的深深思念,是戰後台語流行歌黃金年代的代表作。他與葉俊麟合作的〈舊情綿綿〉〈淡水暮色〉同樣傳唱至今。\n【被壓抑的黃金年代】1950 年代台語歌壇人才輩出,但隨後政府推行國語政策,廣播電視上的台語歌曲與節目被大幅限縮,台語歌逐漸退出主流舞台。理解這段歷史,才會懂幾十年後的「新台語歌運動」為什麼被稱為一場文化翻身。',

  {sid:'tw3',t:'月亮代表我的心',a:'鄧麗君',y:1977,tag:'華語共同記憶',c:'🇹🇼 台灣',yt:null,featured:true,

  {sid:'tw4',t:'掌聲響起',a:'鳳飛飛',y:1986,tag:'國民歌后',c:'🇹🇼 台灣',yt:null,featured:true,

  {sid:'tw5',t:'恰似你的溫柔',a:'蔡琴',y:1980,tag:'民歌時代',c:'🇹🇼 台灣',yt:null,featured:true,

  {sid:'tw6',t:'我的未來不是夢',a:'張雨生',y:1988,tag:'勵志經典',c:'🇹🇼 台灣',yt:null,featured:true,
   story:'【解嚴後的青春吶喊】1987 年台灣解除長達三十八年的戒嚴,社會迎來充滿希望的年代。1988 年張雨生以清亮的高音唱出〈我的未來不是夢〉——它原本是飲料廣告歌,卻意外成為整個世代「認真的過每一分鐘」的勵志國歌,唱進無數打拚青年的心裡。\n【天才的兩個身分】張雨生不只是高音天才,更是眼光獨到的音樂製作人:他一手打造了張惠妹的出道專輯,把她推向天后之路。1997 年他因車禍離世,年僅三十一歲,但他的聲音與作品至今仍被一再翻唱與致敬。',

  {sid:'tw7',t:'向前走',a:'林強',y:1990,tag:'新台語歌',c:'🇹🇼 台灣',yt:null,featured:true,ll:'台語',
   story:'【搭火車北上的搖滾宣言】1990 年林強的〈向前走〉,唱青年拖著行李搭火車到台北打拚,一句「台北台北車頭到啦」道盡北漂遊子的心情。它用搖滾節奏取代傳統台語歌的悲情哭腔,把台語從哀愁唱成昂首前進,一推出就轟動全台。\n【新台語歌運動】這首歌被視為「新台語歌運動」的開山之作:解嚴後的 1990 年代,林強、陳明章、伍佰等音樂人用搖滾與民謠重新打造台語歌,讓年輕人重新以母語為傲。林強後來轉向電影配樂,與侯孝賢等導演合作,多次拿下配樂獎項。',

   story:'【台客搖滾的抒情面】伍佰是 1990 年代台灣最具代表性的搖滾歌手,被樂迷稱為「台客搖滾教父」,現場演出魅力驚人。1996 年的〈挪威的森林〉以標誌性的電吉他前奏與滄桑嗓音,唱愛人心中無法進入的角落,成為 KTV 必點與演唱會萬人合唱的定番。\n【歌名的文學旅行】「挪威的森林」這名字旅行了三段:先是英國樂團披頭四的歌曲〈Norwegian Wood〉,再成為日本作家村上春樹的暢銷小說書名,伍佰讀了小說有感而發寫下這首歌。一個名字橫跨英國搖滾、日本文學與台灣搖滾,是流行文化互相滋養的最佳例子。',

  {sid:'tw9',t:'姊妹',a:'張惠妹',y:1996,tag:'天后出道',c:'🇹🇼 台灣',yt:null,featured:true,
   story:'【出道即天后】1996 年,來自台東卑南族的張惠妹以專輯《姊妹》出道,爆發力十足的嗓音立刻征服全台,專輯銷量驚人,讓她從 pub 駐唱歌手一躍成為華語天后「阿妹」。這張專輯正是由張雨生製作,兩人的合作成為華語樂壇的傳奇。\n【原住民歌手站上中心】在阿妹之前,原住民歌手常被主流市場忽略;她的成功讓大家看見原住民的音樂能量,此後動力火車、A-Lin 等原民歌手接連走紅。〈姊妹〉輕快的節奏帶著部落歌謠的生命力,是流行音樂與族群文化交會的里程碑。',

  {sid:'tw10',t:'憨人',a:'五月天',y:1999,tag:'台語搖滾',c:'🇹🇼 台灣',yt:null,featured:true,ll:'台語',
   story:'【唱給戇直打拚的人】1999 年五月天在早期專輯中寫下台語歌〈憨人〉,主唱阿信唱出「我毋是頭腦空空,我毋是一隻米蟲」,獻給每個被笑傻卻仍堅持夢想的人。在演唱會上,這首歌總是萬人合唱、手機燈海搖曳的經典時刻。\n【樂團世代的開端】五月天從台北的地下樂團場景起家,證明「玩團」也能走進主流市場,啟發後來無數學生組樂團的風氣。他們選擇用台語寫〈憨人〉,也延續了新台語歌運動的精神——母語不只能唱悲情,也能唱夢想與溫柔。',
   phrases:[

  {sid:'tw11',t:'家後',a:'江蕙',y:2001,tag:'台語歌后',c:'🇹🇼 台灣',yt:null,featured:true,ll:'台語',

  {sid:'tw12',t:'忠孝東路走九遍',a:'動力火車',y:2001,tag:'原民搖滾',c:'🇹🇼 台灣',yt:null,featured:true,

  {sid:'tw13',t:'Super Star',a:'S.H.E',y:2003,tag:'女團流行',c:'🇹🇼 台灣',yt:null,featured:true,
   story:'【華語女團的黃金年代】S.H.E 由 Selina、Hebe、Ella 組成,團名取自三人英文名的字首。2003 年的〈Super Star〉以「你是電、你是光、你是唯一的神話」的副歌傳唱整個華語圈,是 2000 年代台灣女團黃金時期最具代表性的作品之一。\n【台式女團文化學】相較於韓國女團強調整齊劃一,台灣女團更講「個性互補」:S.H.E 三人一個甜美、一個知性、一個中性帥氣,不同的粉絲都能找到投射對象。這種像姊妹又像同學的鄰家感,是台式偶像文化的獨特配方。',

  {sid:'tw14',t:'旅行的意義',a:'陳綺貞',y:2004,tag:'獨立女聲',c:'🇹🇼 台灣',yt:null,featured:true,
   story:'【一把木吉他的文青美學】2004 年陳綺貞的〈旅行的意義〉用輕柔的木吉他與呢喃般的嗓音,細數愛人走過的城市,最後輕輕點破「你離開我,就是旅行的意義」。她自己寫歌、自己經營品牌、在小型場地演出,這種獨立姿態定義了華語「文青」的聲音想像。\n【Live House 文化】陳綺貞早期常在台北的「女巫店」等 Live House 演出——這類小型現場音樂空間是台灣獨立音樂的搖籃,觀眾和歌手只隔幾步距離,蘇打綠、盧廣仲也都從這裡起步。「我在女巫店看過她」曾是文青最驕傲的一句話。',

  {sid:'tw15',t:'青花瓷',a:'周杰倫',y:2007,tag:'中國風',c:'🇹🇼 台灣',yt:null,featured:true,
   story:'【中國風的巔峰之作】2007 年周杰倫與作詞人方文山合作的〈青花瓷〉,把愛情比喻成瓷器與江南煙雨,詞藻典雅到連國文課都拿來當教材,是「中國風」流行歌的巔峰。方文山擅長把古典意象放進流行旋律,與周杰倫的組合改寫了華語流行樂的樣貌。\n【天青色其實不是青花瓷】名句「天青色等煙雨」藏著陶瓷典故:傳說「雨過天青」的天青色,是宋代汝窯的釉色,要等雨後放晴的天色才燒得出來;而青花瓷其實是藍白相間的另一種瓷器。一句歌詞混搭兩種名瓷,也讓無數學生從流行歌開始認識陶瓷史。',

  {sid:'tw16',t:'舞孃',a:'蔡依林',y:2006,tag:'流行天后',c:'🇹🇼 台灣',yt:null,featured:true,
   story:'【地才的轉型之戰】蔡依林自稱「地才」——不是天才,而是靠後天苦練。2006 年的〈舞孃〉,她苦練彩帶、鞍馬等體操級動作,把舞台變成競技場,完成從甜美偶像到唱跳天后的轉型,並獲得金曲獎肯定,樹立了華語流行「唱跳合一」的標竿。\n【努力也是一種天賦】「地才」後來成為流行語,代表用紀律和練習彌補天分的精神。蔡依林幾乎每張專輯都挑戰新技能,從體操、鋼管到現代舞,這種不斷自我改造的敬業態度,讓她成為許多年輕人心中「努力型偶像」的代名詞。',

  {sid:'tw18',t:'差不多先生',a:'MC HotDog 熱狗',y:2008,tag:'饒舌',c:'🇹🇼 台灣',yt:null,featured:true,
   story:'【饒舌裡的文學課】MC HotDog 熱狗是台灣嘻哈的開拓者之一。2008 年的〈差不多先生〉借用作家胡適筆下凡事馬虎的人物「差不多先生」,自嘲每天過著差不多的人生:差不多的夢想、差不多的妥協,用綿密押韻道盡年輕人的無奈,成為中文饒舌的經典文本。\n【嘻哈的在地化】嘻哈源自美國街頭,核心精神是「keep it real」——說真話、做自己。台灣饒舌歌手把它在地化:熱狗唱補習班、唱小人物的日常,而不是照搬美式的豪車金鏈。用自己的語言押韻、講自己的生活,才是嘻哈精神真正的落地。',

  {sid:'tw19',t:'幹大事',a:'頑童MJ116',y:2016,tag:'饒舌',c:'🇹🇼 台灣',yt:null,featured:true,
   story:'【從街頭到小巨蛋】頑童MJ116 由瘦子、大淵、小春三人組成,從台北的街頭派對與地下場景一路打拚。2016 年的〈幹大事〉唱出兄弟同行、把夢做大的豪氣,他們後來更站上小巨蛋開唱,象徵台灣本土嘻哈從地下正式走上最大的主流舞台。\n【台式嘻哈的氣口】台語說「氣口(khuì-kháu)」,指說話唱歌的腔調與氣勢。頑童的歌混著國語、台語和街頭俚語,唱夜市、機車與兄弟情,而不是模仿美國腔——這種接地氣的台味,正是台灣嘻哈能圈粉整個世代的原因。',

  {sid:'tw20',t:'癡情玫瑰花',a:'玖壹壹 feat. Ella',y:2015,tag:'台語饒舌',c:'🇹🇼 台灣',yt:null,featured:true,ll:'台語',

  {sid:'tw21',t:'島嶼天光',a:'滅火器 Fire EX.',y:2014,tag:'社運之歌',c:'🇹🇼 台灣',yt:null,featured:true,ll:'台語',
   story:'【為運動而寫的歌】2014 年 3 月,反對兩岸服貿協議的學生與公民佔領立法院,史稱太陽花運動。來自高雄的龐克樂團滅火器為運動寫下台語歌〈島嶼天光〉,「天色漸漸光」唱出徹夜守候後迎接黎明的心情,後來拿下金曲獎年度歌曲。\n【音樂與公民社會】從美國民權運動的〈We Shall Overcome〉到台灣的〈島嶼天光〉,歌曲常成為社會運動的共同語言:旋律讓陌生人能一起開口,歌詞替集體情緒找到出口。無論立場為何,這首歌都記錄了台灣年輕世代參與公共事務的一個歷史時刻。',

  {sid:'tw22',t:'山海',a:'草東沒有派對',y:2016,tag:'厭世世代',c:'🇹🇼 台灣',yt:null,featured:true,

  {sid:'tw25',t:'魚仔',a:'盧廣仲',y:2017,tag:'台語小清新',c:'🇹🇼 台灣',yt:null,featured:true,ll:'台語',

  {sid:'tw26',t:'老人飲酒歌',a:'郭英男 (Difang)',y:1988,tag:'阿美族古調',c:'🇹🇼 台灣',yt:null,featured:true,ll:'阿美語',
   story:'【從部落唱到奧運】郭英男(Difang)是台東馬蘭部落的阿美族長者,他與族人以複音唱法吟唱的〈老人飲酒歌〉,1988 年隨文化交流演出在歐洲被錄音收藏。音樂團體 Enigma 後來取樣這段歌聲做成〈Return to Innocence〉,又被 1996 年亞特蘭大奧運宣傳片採用,讓阿美族歌聲傳遍全球——但郭英男的名字起初根本沒被標註。\n【一場國際著作權大戰】郭英男夫婦跨海提告,主張原住民歌謠的權利,最後雙方和解,作品也補上署名。這個案例成為「傳統智慧創作保護」的國際經典教材:世代相傳的部落古調,誰能拿去用?台灣後來立法保護原住民族傳統智慧創作,正與這段歷史有關。',

  {sid:'tw27',t:'路 (Dalan)',a:'桑布伊',y:2016,tag:'卑南之聲',c:'🇹🇼 台灣',yt:null,featured:true,ll:'卑南語',

   story:'【草原吹來的當代之聲】HAYA樂團的團名在蒙古語中意為「邊緣」,主唱黛青塔娜來自青海的蒙古族家庭。〈風的足跡〉裡,她空靈悠遠的嗓音在馬頭琴的低吟與呼麥的震動之間穿行,不炫技、不趕拍,讓歌像風一樣掠過草原——把游牧民族的遼闊與孤獨,翻譯成全世界都聽得懂的當代世界音樂。\n【蒙古族音樂三件寶】馬頭琴(morin khuur)琴頭雕著馬頭,音色蒼涼如風過草原;呼麥(khöömei)是一人同時唱出兩個以上聲部的神奇喉音唱法;長調則以自由的節拍與悠長的拖腔聞名。馬頭琴音樂與長調都被列入聯合國非物質文化遺產,如今更被 HAYA 這樣的樂團接上現代編曲,登上國際音樂節的舞台。',

  {sid:'cn2',t:'嬉戲',a:'林海',y:2003,tag:'鋼琴詩人',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【鋼琴與琵琶的捉迷藏】林海畢業於中央音樂學院,被樂迷稱為「鋼琴詩人」。〈嬉戲〉收錄在他以琵琶為主角的專輯《琵琶相》裡:鋼琴輕快地拋出樂句,琵琶俏皮地接住再彈回去,兩件相隔千年、血統迥異的樂器像孩子般追逐嬉鬧——曲如其名,是華語演奏音樂裡少見的靈動小品。\n【新民樂與影視配樂】林海也是多產的影視配樂家,曾為電視劇《大明宮詞》等作品譜寫音樂。他代表的「新民樂」美學,不是把民族樂器供起來懷舊,而是讓琵琶、二胡與鋼琴、弦樂平起平坐地對話,旋律帶著印象派的朦朧色彩——證明傳統樂器也能描繪現代人的心情風景。',

  {sid:'cn3',t:'一無所有',a:'崔健',y:1986,tag:'搖滾開山',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【一聲吶喊的起點】1986 年,崔健穿著軍大衣、背著吉他站上北京的演唱會舞台,唱出〈一無所有〉。沙啞的嗓音喊著「我曾經問個不休」,台下觀眾從錯愕到沸騰——這一晚被許多樂評人視為中國搖滾樂的起點,崔健也因此被稱為「中國搖滾之父」。\n【搖滾裡的民族樂器】崔健的音樂並非照搬西方:他把嗩吶、笛子等民間樂器放進搖滾編制,歌詞帶著西北民歌的直白與土地感。1980 年代的中國青年剛開始接觸世界流行文化,這首歌唱出的迷惘與渴望,成了一整代人的共同記憶。',

  {sid:'cn4',t:'海闊天空',a:'Beyond',y:1993,tag:'粵語搖滾',c:'🇭🇰 香港',yt:null,featured:true,ll:'粵語',tl:'zh-HK',
   story:'【不羈放縱愛自由】Beyond 是 1980 年代成軍的香港搖滾樂團,靈魂人物黃家駒包辦了多數詞曲。1993 年他們發表〈海闊天空〉,唱出「原諒我這一生不羈放縱愛自由」;同年黃家駒在日本錄製節目時意外離世,這首歌成了他的絕唱,也被華人世界一代代傳唱至今。\n【粵語歌的黃金年代】1980、90 年代是粵語流行曲(Cantopop)的巔峰,香港的歌與電影影響整個華人圈,連不會粵語的人都能哼上幾句。〈海闊天空〉跨越了地域:畢業典禮、球場看台、街頭合唱,只要旋律響起,人們就用它互相打氣。',

  {sid:'cn5',t:'紅豆',a:'王菲',y:1998,tag:'天后經典',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【天后與詞人的相遇】王菲出生於北京,後來在香港成為華語樂壇天后,國語、粵語雙聲道通吃。1998 年的〈紅豆〉由詞人林夕填詞,「有時候有時候,我會相信一切有盡頭」把愛情寫成淡淡的哲學,配上王菲慵懶空靈的唱腔,被視為華語情歌美學的高峰之一。\n【一顆豆子的千年典故】為什麼用「紅豆」講思念?典故出自唐代詩人王維的「紅豆生南國,春來發幾枝」,紅豆自古被稱為「相思豆」。流行歌詞裡藏著古典詩詞的密碼,是華語歌的獨特趣味——聽懂一首歌,常常等於複習了一段文學史。',

  {sid:'cn6',t:'十年',a:'陳奕迅',y:2003,tag:'國民情歌',c:'🇭🇰 香港',yt:null,featured:true,ll:'粵語',tl:'zh-HK',

   story:'【沒有宣傳的爆紅】2004 年,一張幾乎沒有打廣告的專輯突然橫掃大街小巷:計程車、雜貨店、夜市都在放刀郎沙啞滄桑的〈2002年的第一場雪〉。這位長期在新疆生活的音樂人靠著口耳相傳創下驚人銷量,成為「草根逆襲」的代名詞,也讓唱片業開始反思:聽眾要的到底是什麼?\n【風沙磨出來的聲音】刀郎的音樂浸著新疆的風土:歌裡有戈壁、雪夜與八樓的公車站牌,編曲吸收了維吾爾族等西域民間音樂的味道。新疆位在古絲路要道,自古就是東西方音樂交匯之地——手鼓、彈撥樂器與高亢的歌腔,都是這片土地給華語流行樂的禮物。',

  {sid:'cn8',t:'天堂',a:'騰格爾',y:1997,tag:'蒙古長調',c:'🇨🇳 中國(蒙古族)',yt:null,featured:true,ll:'蒙古語',
   story:'【名字就叫「天」的男人】騰格爾出生於內蒙古,他的名字在蒙古語裡就是「天」的意思。〈天堂〉從「藍藍的天空、清清的湖水」輕輕起頭,唱到副歌時如長嘯般迸發——「這是我的家,我的天堂」,把遊子對草原故鄉的思念唱得撼動人心,成為蒙古族歌者最著名的代表作之一。\n【聽懂長調】這首歌的唱法深受蒙古族長調(urtyn duu)影響:節拍自由、樂句拉得極長,聲音像在無邊草原上飄蕩,歌詞常獻給天空、駿馬與故土。長調已被列入聯合國非物質文化遺產。近年騰格爾以豪邁嗓音翻唱流行歌在網路翻紅,讓年輕世代重新認識這位草原歌者。',

   story:'【一條通往高原的「天路」】「天路」指的是青藏鐵路——這條 2006 年全線通車的鐵路穿越高原凍土,是世界上海拔最高的鐵路之一。韓紅的母親是藏族歌唱家,她以招牌的嘹亮高音在春節聯歡晚會唱紅這首歌,把火車開上世界屋脊的時代震撼,化成一段高原想像。\n【高原上的歌聲】藏族音樂天生「高」:牧民隔著山谷喊話對歌,練就了穿透力極強的嗓音;歌舞常與節慶、勞動綁在一起。到西藏旅行最常聽到的一句話是「扎西德勒」(吉祥如意),獻上白色哈達則是最隆重的祝福——這些文化符號常常一起出現在藏地歌曲裡。',

  {sid:'cn10',t:'茉莉花',a:'江蘇民歌',y:1800,tag:'民歌名片',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【中國旋律的世界名片】〈茉莉花〉是江蘇民歌,源自民間流傳的小調「鮮花調」,兩百多年前就被西方人記譜帶回歐洲,可能是最早「出國」的中國旋律。曲調溫柔婉轉,像江南水鄉的氣質;在國際場合、外交儀式與大型典禮上,它幾乎成了代表中國的音樂名片。\n【被寫進西方歌劇】義大利作曲家普契尼在歌劇《杜蘭朵》裡採用了〈茉莉花〉的旋律——這部歌劇講的是發生在古代中國的公主故事,劇中名曲〈公主徹夜未眠〉更是聲樂經典。一首民間小調飄洋過海變成歌劇素材,是東西方音樂交流史上最著名的案例之一。',

  {sid:'cn11',t:'自由',a:'女子十二樂坊',y:2003,tag:'民樂流行化',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【站起來的民樂】傳統民樂演出多半正襟危坐,女子十二樂坊卻讓十二位科班出身的演奏家站著拉二胡、彈琵琶、吹竹笛,配上流行節拍與時尚造型。她們 2003 年先在日本爆紅、專輯大賣,再紅回中國——這條「出口轉內銷」的走紅路線,成了民樂流行化最著名的案例。\n【民樂現代化的辯論】有人叫好:年輕人終於願意聽二胡了;也有人皺眉:這還算傳統嗎?這場辯論延續至今,從電音國樂到影視配樂,民族樂器不斷嘗試新語法。順帶一提:中國大陸稱「民樂」,台灣稱「國樂」,香港稱「中樂」,新加坡稱「華樂」——同一種音樂,四種名字。',

  {sid:'cn12',t:'藍蓮花',a:'許巍',y:2002,tag:'搖滾詩',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【最溫柔的搖滾圖騰】「沒有什麼能夠阻擋,你對自由的嚮往」——來自西安的許巍,把搖滾從嘶吼變成詩。他早年在地下樂團打滾、也經歷過低潮,後來的作品越來越開闊溫暖,〈藍蓮花〉成了中國搖滾最溫柔的精神圖騰,校園、畢業季與旅途歌單裡永遠有它。\n【一朵獻給行者的花】許巍曾自述,這首歌的靈感與唐代高僧玄奘有關——那位獨自西行取經、穿越沙漠的行者。藍蓮花在佛教文化中象徵純淨與超脫,「心中那自由的世界,如此的清澈高遠」,寫的正是歷經磨難仍不放棄理想的心境。搖滾與古典心靈,在這首歌裡合而為一。',

  {sid:'cn13',t:'無地自容',a:'黑豹樂隊',y:1992,tag:'搖滾黃金年代',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【黃金年代的重型印記】黑豹樂隊成立於 1980 年代末的北京,首張專輯《黑豹》據稱銷量上百萬張,是中國搖滾商業上最成功的作品之一。〈無地自容〉開頭那段吉他重複樂句(riff)一響,就是一個時代的印記;當時的主唱竇唯,後來也成為華語音樂最具實驗性的人物之一。\n【90 年代搖滾盛世】1990 年代初被稱為中國搖滾的黃金年代:黑豹、唐朝樂隊與「魔岩三傑」(竇唯、張楚、何勇)先後崛起,1994 年的香港紅磡演唱會更被樂迷奉為傳奇之夜。長髮、皮衣、大音牆,那是搖滾樂第一次真正闖進華語主流視野的年代。',

  {sid:'cn14',t:'殺死那個石家莊人',a:'萬能青年旅店',y:2010,tag:'獨立神作',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【一座工業城市的史詩】萬能青年旅店來自河北省會石家莊——一座以工廠與藥廠聞名的城市。這首歌用「如此生活三十年,直到大廈崩塌」描寫時代劇變中普通家庭的失落:工作、生活的安穩節奏一夕瓦解。小號與吉他堆出的高潮,被許多樂評人譽為華語獨立搖滾的天花板。\n【獨立音樂的生存之道】「獨立音樂」指不依附主流唱片工業、自主創作發行的音樂。中國的獨立樂團多半從 Livehouse(小型現場演出空間)起家,再靠迷笛、草莓等音樂節累積聽眾。萬青十年才出一張專輯的慢工出細活,恰好是與神曲工廠相反的另一種音樂人生。',

  {sid:'cn15',t:'你要跳舞嗎',a:'新褲子',y:2018,tag:'樂隊的夏天',c:'🇨🇳 中國',yt:null,featured:true,

  {sid:'cn16',t:'平凡之路',a:'朴樹',y:2014,tag:'世代情懷',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【沉寂十年的回歸】朴樹在 1990 年代末以〈那些花兒〉等歌成名,卻在巔峰期淡出樂壇多年。2014 年,他為作家韓寒執導的電影《後會無期》寫下主題曲〈平凡之路〉,「我曾經跨過山和大海,也穿過人山人海」一夜刷屏——一位消失的歌手,用一首歌宣告歸來。\n【為什麼「平凡」打動人】歌詞的結論是「平凡才是唯一的答案」:年少時想改變世界,繞了一圈才發現平凡的可貴。這種「燃燒後的釋然」恰好擊中了離鄉打拚的年輕世代。朴樹惜字如金、多年磨一張專輯的性格,也讓他成為華語樂壇少見的「慢」的象徵。',

  {sid:'cn17',t:'北京北京',a:'汪峰',y:2007,tag:'城市搖滾',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【獻給北漂的城市之歌】汪峰是中央音樂學院小提琴科班出身,組過搖滾樂團「鮑家街43號」後單飛。〈北京北京〉在咆哮與疲憊之間,唱出大城市的夢想與代價:「我在這裡歡笑,我在這裡哭泣」——地鐵裡、出租屋中無數異鄉人聽到自己的心聲。\n【什麼是「北漂」】「北漂」指離開家鄉、到北京打拚卻沒有本地戶口的人,如同漂在城市上空的浮萍。高房租、快節奏與擠地鐵是日常,支撐他們的是機會與夢想。城市化是當代中國最大的故事之一,而〈北京北京〉正是這個故事的搖滾版主題曲。',

  {sid:'cn18',t:'夜上海',a:'周璇',y:1946,tag:'老上海',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【金嗓子與不夜城】「夜上海,夜上海,你是個不夜城」——1940 年代,歌影雙棲的周璇以甜美清亮的嗓音被譽為「金嗓子」。〈夜上海〉出自她主演的電影,描繪霓虹閃爍、歌舞昇平的上海夜色,也唱到繁華背後打拚者的疲憊,是老上海最著名的聲音記憶。\n【華語流行樂的源頭】1930、40 年代的上海是華語流行音樂的發源地:唱片公司、電影業與舞廳孕育出「時代曲」——中式旋律配上爵士樂編曲的摩登混血。後來這批音樂人南遷香港,把時代曲的血脈傳給了粵語歌與國語流行曲。聽〈夜上海〉,等於聽華語流行樂的第一章。',

  {sid:'cn19',t:'李白',a:'李榮浩',y:2013,tag:'創作全能',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【一個人就是一支製作團隊】「要是能重來,我要選李白」——李榮浩用幽默的自嘲唱現代人的無奈:活得不如古人瀟灑。他驚人的地方在於詞、曲、編曲、混音幾乎一人包辦,首張專輯《模特》更讓他拿下台灣金曲獎最佳新人,成為「全能創作人」的代名詞。\n【為什麼選李白】李白是唐代最浪漫的詩人,人稱「詩仙」:喝酒、寫詩、遊歷天下,「天生我材必有用」的豪氣千年不減。流行歌拿古代詩人開玩笑,其實是年輕世代與古典文化搭話的方式——先會唱「要是能重來」,再回頭讀〈將進酒〉,語文課突然就有趣了。',

  {sid:'cn20',t:'大魚',a:'周深',y:2016,tag:'動畫金曲',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【一條游進音樂廳的大魚】〈大魚〉是動畫電影《大魚海棠》的印象曲。周深的嗓音清澈超然、雌雄莫辨,把「海浪無聲將夜幕深深淹沒」唱得像從深海傳來的一縷光。這首歌讓「動畫歌曲」登上大雅之堂,也讓曾赴烏克蘭學聲樂的周深,成為華語樂壇最獨特的聲音之一。\n【從莊子游出來的想像】《大魚海棠》的靈感源自《莊子・逍遙遊》的開篇:「北冥有魚,其名為鯤」——北方大海有一條大魚,化為大鳥扶搖直上。兩千多年前的哲學寓言,變成動畫與流行歌的素材;古籍不是只能背誦的課文,也是最華麗的想像力資料庫。',

  {sid:'cn21',t:'最炫民族風',a:'鳳凰傳奇',y:2009,tag:'廣場舞國歌',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【從被嘲「土」到全民真香】鳳凰傳奇是「女聲主唱+男聲說唱」的二人組:玲花高亢的民族唱腔配上曾毅的饒舌。〈最炫民族風〉草原風旋律加電子舞曲節拍,曾被年輕人嘲笑「土味」,結果越聽越上頭,連 NBA 球場都放過——標準的「真香」逆襲劇本。\n【傍晚六點半的中國】想理解中國的日常,就去看廣場舞:傍晚的廣場、公園,大媽大叔們跟著音響齊跳健身舞,而〈最炫民族風〉正是點播率最高的「國歌」之一。廣場舞是中老年人的社交、健身與舞台,偶爾也因音量太大引發鄰里拉鋸——一種再真實不過的庶民文化。',

  {sid:'cn22',t:'華陰老腔一聲喊',a:'譚維維 × 華陰老腔藝人',y:2016,tag:'老腔搖滾',c:'🇨🇳 中國',yt:null,featured:true,
   story:'【黃土高原上的搖滾】華陰老腔是陝西華陰的古老皮影戲唱腔,靠家族世代口傳,唱法粗獷豪邁如吼,還會掄起木頭長板凳敲擊伴奏,被暱稱「黃土高原上的搖滾」。2016 年歌手譚維維與老腔藝人同台,傳統嘶吼撞上電吉他,登上春節聯歡晚會的演出震撼全國。\n【老藝術的絕地回魂】許多傳統戲曲正面臨觀眾老化、後繼無人的危機,老腔也曾瀕臨失傳,如今被列入非物質文化遺產保護。與流行、搖滾跨界,讓白髮藝人站上最大的舞台——有人說這是糟蹋傳統,更多人說這是回魂:只要有人聽,老聲音就能活下去。',

  {sid:'cn23',t:'酒歌',a:'杭蓋樂隊',y:2010,tag:'草原搖滾',c:'🇨🇳 中國(蒙古族)',yt:null,featured:true,ll:'蒙古語',
   story:'【把草原插上電】杭蓋樂隊由蒙古族音樂人在北京組成,「杭蓋」在蒙古語中意為水草豐美、有山有河的理想草原。他們把呼麥的喉音、馬頭琴的蒼涼接上貝斯與電吉他,〈酒歌〉唱得豪邁酣暢,讓他們從地下場景一路唱進世界各地的音樂節,是蒙古族音樂國際化的代表團體。\n【酒歌是一種待客之道】在蒙古族傳統裡,宴席上要唱敬酒歌:主人捧著酒獻歌,客人聽完才飲,歌聲比酒更能表達敬意。這類「儀式歌謠」在草原文化中無處不在——婚禮、那達慕大會、迎賓送客都有專屬的歌。聽懂酒歌,就摸到了游牧民族好客文化的核心。',

  {sid:'cn24',t:'萬物生',a:'薩頂頂',y:2007,tag:'神祕主義',c:'🇨🇳 中國',yt:null,featured:true,

  {sid:'cn25',t:'忐忑',a:'龔琳娜',y:2010,tag:'神曲鼻祖',c:'🇨🇳 中國',yt:null,featured:true,

  {sid:'cn27',t:'苦行僧',a:'GAI 周延',y:2017,tag:'方言嘻哈',c:'🇨🇳 中國',yt:null,featured:true,ll:'四川話',

    {q:'〈Every Summertime〉收錄於哪部電影的原聲帶?',o:['尚氣','鐵達尼號','花木蘭','阿凡達'],a:0},
    {q:'NIKI 的音樂起點是?',o:['YouTube 翻唱頻道','選秀節目','歌劇院','廣播電台'],a:0},
    {q:'印尼語「musim panas」的意思是?',o:['夏天','冬天','雨天','半夜'],a:0}]},
  {sid:'sea29',t:'Begadang',a:'Rhoma Irama',y:1973,tag:'Dangdut之王',c:'🇮🇩 印尼',yt:null,featured:true,
   story:'【Dangdut 之王的忠告】〈Begadang〉意思是「熬夜」,Rhoma Irama 用招牌的 dangdut 節奏唱出貼心提醒:沒事別熬夜,身體會壞掉。這位被稱為「Dangdut 之王」的歌手與他的樂團,從 1970 年代起紅遍印尼,把庶民舞曲變成全國性的音樂勢力。\n【什麼是 Dangdut?】Dangdut 是印尼最具代表性的庶民音樂,融合馬來歌謠、印度電影配樂與中東旋律,名字來自鼓聲的擬聲「dang-dut」。婚禮、夜市、競選造勢都少不了它,搖擺的節奏讓人忍不住跟著扭(印尼語叫 goyang)——堪稱印尼版的全民伴奏。',
   phrases:[
    {n:'Begadang',r:'be-ga-dang',m:'熬夜'},
    {n:'Jangan begadang',r:'ja-ngan be-ga-dang',m:'別熬夜(jangan=別)'},
    {n:'Goyang!',r:'go-yang',m:'搖起來、扭起來!'},
    {n:'Enak!',r:'e-nak',m:'好吃、舒服'}],
   quiz:[
    {q:'「Begadang」的意思是?',o:['熬夜','跳舞','結婚','吃早餐'],a:0},
    {q:'Dangdut 的名字來自?',o:['鼓聲的擬聲','一位國王的名字','一種水果','城市名'],a:0},
    {q:'印尼語「goyang」的意思是?',o:['搖擺、扭動','睡覺','讀書','游泳'],a:0}]},
  {sid:'sea30',t:'Bengawan Solo',a:'Gesang',y:1940,tag:'世紀民謠',c:'🇮🇩 印尼',yt:null,featured:true,
   story:'【一條河流唱遍亞洲】〈Bengawan Solo〉是印尼音樂家 Gesang 在 1940 年寫下的名曲,歌詠爪哇島的梭羅河。旋律優美易記,二戰前後傳到日本與華語世界,被翻唱成日文版與中文版〈梭羅河畔〉,在台灣也曾風靡一時,堪稱東南亞最著名的旋律。\n【Kroncong 的混血身世】這首歌屬於 kroncong(克隆宗)曲風:數百年前葡萄牙人把小型撥弦樂器帶到印尼群島,與當地音樂融合,形成這種溫柔搖曳的樂種。一首歌裡有葡萄牙的琴、爪哇的河、亞洲共同的記憶——音樂的旅行,比人走得更遠。',
   phrases:[
    {n:'Bengawan Solo',r:'be-nga-wan so-lo',m:'梭羅河(bengawan=大河)'},
    {n:'Sungai',r:'su-ngai',m:'河流'},
    {n:'Air',r:'a-ir',m:'水'},
    {n:'Indah',r:'in-dah',m:'美麗'}],
   quiz:[
    {q:'〈Bengawan Solo〉歌詠的是?',o:['爪哇島的梭羅河','一座火山','雅加達的夜市','峇里島海灘'],a:0},
    {q:'Kroncong 曲風融合了誰帶來的樂器?',o:['葡萄牙人','維京人','蒙古人','羅馬人'],a:0},
    {q:'這首歌的中文版名稱是?',o:['梭羅河畔','月亮代表我的心','甜蜜蜜','橄欖樹'],a:0}]}
 ]}
];
const COMING=[];
/* 首頁國家卡片順序:每次載入網頁隨機洗牌一次 */
const HOME_ORDER=REGIONS.map((_,i)=>i);
for(let i=HOME_ORDER.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[HOME_ORDER[i],HOME_ORDER[j]]=[HOME_ORDER[j],HOME_ORDER[i]];}
/* 國家標注:song.c 優先,否則查 CMAP,再退回區域預設 defc */
const CMAP={
 en1:'🇬🇧 英國',en2:'🇬🇧 英國',en3:'🇺🇸 美國',en4:'🇬🇧 英國',en5:'🇬🇧 英國',en6:'🇬🇧🇺🇸 英/美',en7:'🇺🇸 美國',en8:'🇺🇸 美國',en9:'🇬🇧 英國',en10:'🇺🇸 美國',
 en11:'🇨🇦 加拿大',en12:'🇬🇧 英國',en13:'🇺🇸 美國',en14:'🇬🇧 英國',en15:'🇺🇸 美國',en16:'🇺🇸 美國',en17:'🇺🇸 美國',en18:'🇺🇸 美國',en19:'🇺🇸 美國',en20:'🇺🇸 美國',
 en21:'🇺🇸 美國',en22:'🇺🇸 美國',en23:'🇬🇧 英國',en24:'🇬🇧 英國',en25:'🇸🇪 瑞典',en26:'🇬🇧 英國',en27:'🇺🇸 美國',en28:'🇦🇺 澳洲',en29:'🇺🇸 美國',en30:'🇬🇧 英國'
};
REGIONS.forEach(r=>r.songs.forEach(s=>{if(!s.c)s.c=CMAP[s.sid]||r.defc||'';}));

/* ================= 渲染 ================= */
const app=document.getElementById('app');
function render(){
  document.getElementById('scoreBox').textContent='⭐ '+state.score;
  if(state.view==='home')renderHome();
  else if(state.view==='region')renderRegion();
  else renderSong();
}
function goHome(){state.view='home';render();window.scrollTo(0,0);}
function openRegion(i){state.region=i;state.view='region';state.filter='all';state.query='';render();window.scrollTo(0,0);}
function openSong(idx){state.song=idx;state.view='song';state.step=0;render();window.scrollTo(0,0);}
function setStep(s){state.step=s;render();}
function setQuery(v){state.query=v.toLowerCase();renderSongList();}

function renderHome(){
  let cards=HOME_ORDER.map(i=>{const r=REGIONS[i];
    const doneN=r.songs.filter(s=>s.featured&&state.done[s.sid]).length;
    return `<div class="region-card" onclick="openRegion(${i})">
      <div class="flag">${r.flag}</div><h3>${L(r.name)}</h3><p>${L(r.tag)}</p>
      <div class="cnt">🎵 30 ${LANG==='zh'?'首':'songs'} · ⭐ ${LANG==='zh'?'完整單元':'full units'} ${doneN}/30</div></div>`;
  }).join('');
  cards+=COMING.map(c=>`<div class="region-card coming"><div class="flag">${c.flag}</div><h3>${L(c.name)}</h3><p>${T('comingSoon')}</p></div>`).join('');
  app.innerHTML=`<div class="hero">
    <div class="bigwm">Tune<span>Hop</span></div>
    <h1>${T('heroTitle')}</h1>
    <button class="tp-btn" onclick="teleport()">✈️ ${T('teleport')}</button></div>
    <div class="grid">${cards}</div>`;
}

function songCards(){
  const r=REGIONS[state.region];
  return r.songs.filter(s=>{
    if(state.filter==='full'&&!s.featured)return false;
    if(state.filter==='lib'&&s.featured)return false;
    if(state.query&&!(s.t.toLowerCase().includes(state.query)||s.a.toLowerCase().includes(state.query)))return false;
    return true;
  }).map(s=>{
    const idx=r.songs.indexOf(s);
    if(s.featured){
      return `<div class="song-card featured" onclick="openSong(${idx})">
        <span class="fbadge">${T('fullTag')}</span>
        ${state.done[s.sid]?`<span class="donebadge">${T('doneTag')}</span>`:''}
        <div class="st">${s.t}</div><div class="sa">${s.a} · ${s.y}</div>
        <span class="stag">${s.c}</span> <span class="stag">${s.tag}</span></div>`;
    }
    return `<div class="song-card" id="lib-${s.sid}" onclick="toggleLib('${s.sid}')">
      <div class="st">${s.t}</div><div class="sa">${s.a} · ${s.y}</div>
      <span class="stag">${s.c}</span> <span class="stag">${s.tag}</span>
      <div class="blurb">${s.blurb}<br>
        <a class="yt-search" href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.a+' '+s.t)}" target="_blank" onclick="event.stopPropagation()">${T('openYT')}</a></div></div>`;
  }).join('');
}
function renderSongList(){const el=document.getElementById('songList');if(el)el.innerHTML=songCards();}
function toggleLib(sid){const el=document.getElementById('lib-'+sid);if(el)el.classList.toggle('open');}

function renderRegion(){
  const r=REGIONS[state.region];
  const topics=r.topics.map(t=>`<div class="topic"><div class="tt">${L(t.t)}</div><div class="td">${L(t.d)}</div></div>`).join('');
  app.innerHTML=`<button class="back" onclick="goHome()">${T('back')}</button>
    <h1 style="margin-bottom:4px">${r.flag} ${L(r.name)}</h1>
    <p style="color:var(--muted)">${L(r.tag)}</p>
    ${LANG==='en'?`<div class="note">${T('enNote')}</div>`:''}
    <div class="toolbar">
      <input class="search" placeholder="${T('searchPh')}" value="${state.query}" oninput="setQuery(this.value)"></div>
    <div class="songs" id="songList">${songCards()}</div>
    <h2 style="margin:30px 0 6px">${T('trend')}</h2>
    <div class="note">${T('trendNote')}</div>${topics}`;
}

function renderSong(){
  const r=REGIONS[state.region],s=r.songs[state.song];
  /* 曲庫曲目(非完整單元):顯示簡介頁 */
  if(!s.featured){
    app.innerHTML=`<button class="back" onclick="state.view='region';render();window.scrollTo(0,0)">${T('back')}</button>
      <button class="tp-btn small" onclick="teleport()">✈️ ${T('teleport')}</button>
      <div class="panel"><h2>${s.a} — ${s.t}</h2>
      <p style="color:var(--muted);margin:-4px 0 12px;font-size:.85rem">${s.c} · ${s.y} · ${s.tag}</p>
      <p>${s.blurb}</p>
      <div class="no-embed">🎬<br><a href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.a+' '+s.t)}" target="_blank">${T('openYT')}</a></div>
      <div class="note">${LANG==='zh'?'🎵 此為精選曲庫曲目,完整單元(文化故事+對話+測驗)製作中。':'🎵 Library track — full unit coming soon.'}</div></div>`;
    return;
  }
  const stepBtns=T('steps').map((x,i)=>`<button class="step-btn ${i===state.step?'active':''}" onclick="setStep(${i})">${x}</button>`).join('');
  let body='';
  if(state.step===0){
    const storyArr=typeof s.story==='string'
      ? s.story.split('\n').map(p=>{const m2=p.match(/^【(.+?)】(.*)$/);return m2?[m2[1],m2[2]]:['',p];})
      : (s.story[LANG]||s.story.zh);
    const video=s.yt
      ? `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${s.yt}" allowfullscreen title="${s.t}"></iframe></div>
         <a class="yt-link" href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.a+' '+s.t)}" target="_blank">${T('ytFallback')}</a>`
      : `<div class="no-embed">🎬<br><a href="https://www.youtube.com/results?search_query=${encodeURIComponent(s.a+' '+s.t+' official mv')}" target="_blank">${T('openYT')}</a></div>`;
    body=`<div class="panel"><h2>${s.a} — ${s.t}</h2><p style="color:var(--muted);margin:-4px 0 12px;font-size:.85rem">${s.c} · ${s.y} · ${s.tag}</p>${video}
      ${storyArr.map(x=>`<h4>${x[0]}</h4><p>${x[1]}</p>`).join('')}</div>`;
  } else if(state.step===1){
    body=`<div class="panel"><h2>💬 ${LANG==='zh'?'學會這幾句,跟當地人聊起來':'Phrases to chat with locals'}${s.ll?` <span style="font-size:.8rem;color:var(--muted)">(${s.ll})</span>`:''}</h2>
      ${s.phrases.map((p,i)=>`<div class="phrase">
        <div style="min-width:180px"><div class="native">${p.n}</div>${p.r?`<div class="roma">${p.r}</div>`:''}</div>
        <div class="mean">${L(p.m)}</div>
        <button class="speak-btn" onclick="speak(${state.region},${state.song},${i})">${T('speak')}</button></div>`).join('')}</div>`;
  } else {
    body=`<div class="panel"><h2>🎮 ${LANG==='zh'?'小測驗:答對得星星':'Quiz: earn stars'}</h2>
      ${s.quiz.map((q,qi)=>`<div class="quiz-q">
        <div class="qt">${qi+1}. ${L(q.q)}</div>
        ${shuffled(s.sid,qi,q).map(o=>`<button class="opt" onclick="answer('${s.sid}',${qi},${o.i},this)">${o.txt}</button>`).join('')}</div>`).join('')}</div>`;
  }
  app.innerHTML=`<button class="back" onclick="state.view='region';render();window.scrollTo(0,0)">${T('back')}</button>
    <button class="tp-btn small" onclick="teleport()">✈️ ${T('teleport')}</button>
    <div class="steps">${stepBtns}</div>${body}`;
}

const shuffleCache={};
function shuffled(sid,qi,q){
  const key=sid+'-'+qi+'-'+LANG;
  if(!shuffleCache[key]){
    const opts=typeof q.o[0]==='string'?q.o:(q.o[LANG]||q.o.zh);
    const arr=opts.map((txt,i)=>({txt,i}));
    for(let j=arr.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[arr[j],arr[k]]=[arr[k],arr[j]];}
    shuffleCache[key]=arr;
  }
  return shuffleCache[key];
}

/* ================= 互動 ================= */
function answer(sid,qi,choice,btn){
  const r=REGIONS[state.region],s=r.songs.find(x=>x.sid===sid),q=s.quiz[qi];
  const key=sid+'-'+qi;
  if(state.answered[key])return;
  if(choice===q.a){
    state.answered[key]=true;btn.classList.add('correct');
    state.score+=10;save();
    document.getElementById('scoreBox').textContent='⭐ '+state.score;
    toast(T('correct'));
    const done=Object.keys(state.answered).filter(k=>k.startsWith(sid+'-')).length;
    if(done===s.quiz.length&&!state.done[sid]){state.done[sid]=true;save();setTimeout(()=>toast(T('quizDone')+' 🏅'),1200);}
  }else{btn.classList.add('wrong');toast(T('wrong'));setTimeout(()=>btn.classList.remove('wrong'),900);}
}
function speak(ri,si,pi){
  const r=REGIONS[ri],s=r.songs[si],p=s.phrases[pi];
  if(!('speechSynthesis' in window)){toast(LANG==='zh'?'此瀏覽器不支援語音':'Speech not supported');return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(p.n);
  const lang=s.tl||r.tts;
  u.lang=lang;u.rate=0.85;
  const v=speechSynthesis.getVoices().find(v=>v.lang.replace('_','-').startsWith(lang.split('-')[0]));
  if(v)u.voice=v;
  speechSynthesis.speak(u);
}
if('speechSynthesis' in window){speechSynthesis.getVoices();}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600);}
function save(){try{localStorage.setItem('tv_state',JSON.stringify({score:state.score,done:state.done,visits:state.visits}));}catch(e){}}

/* 隨機傳送:每被傳送到一次,該曲下次權重折半 (1 → 1/2 → 1/4 …) */
function teleport(){
  const pool=[];
  REGIONS.forEach((r,ri)=>r.songs.forEach((s,si)=>pool.push({ri,si,w:1/Math.pow(2,state.visits[s.sid]||0)})));
  const total=pool.reduce((a,x)=>a+x.w,0);
  let t=Math.random()*total,pick=pool[pool.length-1];
  for(const x of pool){t-=x.w;if(t<=0){pick=x;break;}}
  const s=REGIONS[pick.ri].songs[pick.si];
  state.visits[s.sid]=(state.visits[s.sid]||0)+1;save();
  state.region=pick.ri;state.song=pick.si;state.step=0;state.view='song';
  render();window.scrollTo(0,0);
  toast('✈️ '+REGIONS[pick.ri].flag+' '+s.t);
}

render();
</script>
</body>
